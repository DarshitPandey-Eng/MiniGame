<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake — Arcade Zone</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="coins.js"></script>
<script src="sound.js"></script>
<script src="game-ui.js"></script>
<style>
:root{--accent:var(--neon-d);}
.sn-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;}
#sncv{display:block;border-radius:12px;border:2px solid var(--line2);touch-action:none;cursor:none;}
.sn-hud{display:flex;gap:8px;width:100%;max-width:520px;}
.sn-stat{flex:1;background:var(--card-bg);border:1px solid var(--line2);border-radius:10px;padding:10px 8px;text-align:center;}
.sn-stat .sv{font-family:var(--font-display);font-size:1.6rem;color:var(--neon-d);line-height:1;}
.sn-stat .sl{font-family:var(--font-mono);font-size:.48rem;color:var(--muted);letter-spacing:.1em;margin-top:2px;}
/* D-pad for mobile */
.dpad{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:4px;margin-top:4px;}
.dpad-btn{border-radius:10px;border:2px solid var(--line2);background:var(--card-bg);color:var(--text);
  font-size:1.2rem;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .08s;
  display:flex;align-items:center;justify-content:center;}
.dpad-btn:active{background:var(--neon-d);color:#000;transform:scale(.92);}
.dpad .empty{visibility:hidden;}
@media (min-width:820px){.dpad{display:none;}}
/* Desktop side panel */
.sn-panel{display:flex;flex-direction:column;gap:10px;}
.sn-diff-row{display:flex;gap:5px;}
.sn-dbtn{font-family:var(--font-mono);font-size:.58rem;font-weight:700;padding:6px 10px;
  border-radius:7px;border:1.5px solid var(--line2);background:var(--bg2);color:var(--muted);cursor:pointer;transition:all .12s;}
.sn-dbtn.on{border-color:var(--neon-d);color:var(--neon-d);background:color-mix(in srgb,var(--neon-d) 12%,transparent);}
</style>
</head>
<body>
<nav class="nav" id="main-nav">
  <a class="nav-back" href="index.html">← Hub</a>
  <div class="nav-sep"></div>
  <div class="nav-title"><span class="dot" style="background:var(--neon-d);box-shadow:0 0 8px var(--neon-d)"></span>SNAKE</div>
  <a class="coin-nav" href="wallet.html"><span>🪙</span><span class="az-bal">0</span></a>
  <button class="theme-btn" id="tb">🌙</button>
</nav>

<div class="page" style="padding-top:10px;align-items:center;">
<div class="sn-wrap game-scale-root">

  <div class="sn-hud" id="sn-hud">
    <div class="sn-stat"><div class="sv" id="sn-score">0</div><div class="sl">SCORE</div></div>
    <div class="sn-stat"><div class="sv" id="sn-high" style="color:var(--neon-c)">0</div><div class="sl">BEST</div></div>
    <div class="sn-stat"><div class="sv" id="sn-len" style="color:var(--neon-a)">1</div><div class="sl">LENGTH</div></div>
    <div class="sn-stat"><div class="sv" id="sn-coins" style="color:var(--neon-f)">+0</div><div class="sl">COINS</div></div>
  </div>

  <!-- Desktop two-col / mobile single-col -->
  <div class="game-desktop-layout" style="align-items:center;">
    <div class="game-canvas-col">
      <canvas id="sncv"></canvas>
      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(-1)" title="Zoom out">−</button>
        <span class="zoom-label" id="zoom-lbl">100%</span>
        <button class="zoom-btn" onclick="changeZoom(1)" title="Zoom in">+</button>
      </div>
      <!-- Mobile D-pad -->
      <div class="dpad" id="dpad">
        <div class="empty"></div>
        <button class="dpad-btn" id="dp-up"   ontouchstart="dpad('UP')"   onmousedown="dpad('UP')">▲</button>
        <div class="empty"></div>
        <button class="dpad-btn" id="dp-left" ontouchstart="dpad('LEFT')" onmousedown="dpad('LEFT')">◀</button>
        <div class="empty"></div>
        <button class="dpad-btn" id="dp-right"ontouchstart="dpad('RIGHT')"onmousedown="dpad('RIGHT')">▶</button>
        <div class="empty"></div>
        <button class="dpad-btn" id="dp-down" ontouchstart="dpad('DOWN')" onmousedown="dpad('DOWN')">▼</button>
        <div class="empty"></div>
      </div>
    </div>

    <div class="sn-panel game-side-panel">
      <div class="sn-stat" style="max-width:999px;">
        <div class="sv" id="sn-lv" style="color:var(--neon-b);font-size:1.2rem;">SLOW</div>
        <div class="sl">SPEED</div>
      </div>
      <div>
        <div style="font-family:var(--font-mono);font-size:.52rem;color:var(--muted);letter-spacing:.1em;margin-bottom:5px;">DIFFICULTY</div>
        <div class="sn-diff-row">
          <button class="sn-dbtn on" id="d-easy"   onclick="setDiff('easy')">EASY</button>
          <button class="sn-dbtn"    id="d-medium" onclick="setDiff('medium')">MED</button>
          <button class="sn-dbtn"    id="d-hard"   onclick="setDiff('hard')">HARD</button>
        </div>
      </div>
      <button class="btn filled" style="--c:var(--neon-d);width:100%" onclick="startGame()">▶ START (🪙 10)</button>
      <button class="btn" style="--c:var(--neon-a);font-size:.72rem;width:100%" onclick="doShare()">📤 Share</button>
      <div style="font-family:var(--font-mono);font-size:.56rem;color:var(--muted);line-height:1.9;margin-top:4px;">
        🍎 Bright apples = +score<br>
        ⭐ Golden apple = +5 bonus<br>
        💠 Blue apple = speed boost<br>
        🍀 Green power = slow time<br>
        <br>Arrow keys / WASD / swipe
      </div>
    </div>
  </div>

</div>
</div>

<script>
/* Theme */
var _tb=document.getElementById('tb');
function _sT(){_tb.textContent=CoinEngine.getTheme()==='dark'?'☀️':'🌙';}
_tb.addEventListener('click',function(){CoinEngine.toggleTheme();_sT();draw();}); _sT();

/* ── Canvas & sizing ── */
var cv=document.getElementById('sncv');
var ctx=cv.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1,2);
var GRID=20; /* cells in each axis */
var CELL, zoomLevel=1, zoomSteps=[0.7,0.85,1,1.2,1.5,1.8,2.2];
var zoomIdx=2;

function calcCell(){
  var navH=56, hudH=60, extraH=160;
  var avH=Math.max(260,window.innerHeight-navH-hudH-extraH);
  var avW=Math.min(window.innerWidth-40, window.innerWidth>820?560:window.innerWidth-24);
  var raw=Math.min(avH,avW);
  return Math.max(14,Math.floor(raw/GRID));
}
function changeZoom(dir){
  zoomIdx=Math.max(0,Math.min(zoomSteps.length-1,zoomIdx+dir));
  document.getElementById('zoom-lbl').textContent=Math.round(zoomSteps[zoomIdx]*100)+'%';
  initCanvas(); if(!alive) draw();
}

function initCanvas(){
  CELL=Math.floor(calcCell()*zoomSteps[zoomIdx]);
  var W=GRID*CELL, H=GRID*CELL;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
initCanvas();
window.addEventListener('resize',function(){initCanvas();if(!alive)draw();});

/* ── Game state ── */
var DIFF='easy';
var SPEEDS={easy:140, medium:90, hard:50};
var DIFF_LABELS={easy:'SLOW',medium:'MED',hard:'FAST'};
var snake, dir, nextDir, food, powerUps, score, highScore=0, alive=false, loopTimer;
var slowActive=false, slowTimer=null;
var appleAnim=0; /* pulse phase */

/* Food/power types */
var TYPES={
  normal: {color:'#ff3a3a', glow:'rgba(255,60,60,.8)', points:10, label:'🍎'},
  golden: {color:'#ffd700', glow:'rgba(255,215,0,.9)',  points:50, label:'⭐'},
  blue:   {color:'#00ccff', glow:'rgba(0,200,255,.9)',  points:20, label:'💠', effect:'speed'},
  slow:   {color:'#00ff88', glow:'rgba(0,255,130,.9)',  points:15, label:'🍀', effect:'slow'},
};

function setDiff(d){
  DIFF=d;
  ['easy','medium','hard'].forEach(function(x){document.getElementById('d-'+x).className='sn-dbtn'+(d===x?' on':'');});
  document.getElementById('sn-lv').textContent=DIFF_LABELS[d];
}

function startGame(){
  if(!CoinEngine.spend(10)){CoinEngine.toast('Not enough coins!','warn');return;}
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; powerUps=[]; slowActive=false;
  clearTimeout(slowTimer);
  spawnFood(); updateUI(0);
  alive=true;
  SoundEngine.play('start');
  SoundEngine.playBGM('reaction');
  clearInterval(loopTimer);
  loopTimer=setInterval(tick, SPEEDS[DIFF]);
  draw();
}

function spawnFood(){
  var type='normal';
  var r=Math.random();
  if(r<0.05) type='golden';
  else if(r<0.12) type='blue';
  else if(r<0.18) type='slow';
  var pos=freeCell();
  food={x:pos.x,y:pos.y,type:type,anim:0};
}

function freeCell(){
  var empty=[];
  for(var x=0;x<GRID;x++) for(var y=0;y<GRID;y++){
    var hit=false;
    for(var i=0;i<snake.length;i++) if(snake[i].x===x&&snake[i].y===y){hit=true;break;}
    if(!hit) empty.push({x:x,y:y});
  }
  return empty[Math.floor(Math.random()*empty.length)]||{x:0,y:0};
}

function tick(){
  dir={x:nextDir.x,y:nextDir.y};
  var head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  /* wall collision */
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID){endGame();return;}
  /* self collision */
  for(var i=0;i<snake.length-1;i++) if(snake[i].x===head.x&&snake[i].y===head.y){endGame();return;}
  snake.unshift(head);
  /* eat food */
  if(head.x===food.x&&head.y===food.y){
    var pts=TYPES[food.type].points;
    score+=pts;
    SoundEngine.play('eat')||SoundEngine.play('pop');
    if(food.type==='golden') CoinEngine.toast('+5 bonus 🌟','success');
    if(food.type==='blue'){/* speed boost handled visually */}
    if(food.type==='slow'){
      slowActive=true; clearTimeout(slowTimer);
      clearInterval(loopTimer);
      loopTimer=setInterval(tick, SPEEDS[DIFF]*2.2);
      slowTimer=setTimeout(function(){
        slowActive=false;
        clearInterval(loopTimer);
        loopTimer=setInterval(tick, SPEEDS[DIFF]);
      },5000);
    }
    spawnFood();
  } else {
    snake.pop();
  }
  /* power-up spawning: 5% chance each tick */
  if(Math.random()<0.05&&powerUps.length<2){
    var pos=freeCell();
    powerUps.push({x:pos.x,y:pos.y,type:Math.random()<0.5?'blue':'slow',ttl:80});
  }
  /* age power-ups */
  powerUps=powerUps.filter(function(p){
    p.ttl--; return p.ttl>0;
  });
  if(score>highScore){highScore=score;}
  updateUI(score);
  draw();
}

function updateUI(s){
  document.getElementById('sn-score').textContent=s;
  document.getElementById('sn-high').textContent=highScore;
  document.getElementById('sn-len').textContent=snake?snake.length:1;
  var est=Math.floor(s*0.25);
  document.getElementById('sn-coins').textContent='+'+est;
}

function endGame(){
  alive=false; clearInterval(loopTimer);
  SoundEngine.stopBGM(); SoundEngine.play('die');
  var reward=Math.floor(score*0.25);
  if(reward>0) CoinEngine.add(reward,'Snake score '+score,'🐍');
  CoinEngine.recordGame('snake',score,score>0,{});
  CoinEngine.toast(reward>0?'+'+reward+' 🪙 Game Over':'Game Over — no score','warn');
  draw();
}

/* ── Drawing ── */
var applePhase=0;
function draw(){
  var isDark=CoinEngine.getTheme()==='dark';
  var W=GRID*CELL, H=GRID*CELL;
  ctx.clearRect(0,0,W,H);

  /* Background grid */
  for(var gx=0;gx<GRID;gx++){
    for(var gy=0;gy<GRID;gy++){
      var even=(gx+gy)%2===0;
      ctx.fillStyle=isDark?(even?'#070714':'#0b0b1c'):(even?'#e8e8f4':'#ddddf0');
      ctx.fillRect(gx*CELL,gy*CELL,CELL,CELL);
    }
  }

  /* Grid lines */
  ctx.strokeStyle=isDark?'rgba(255,255,255,.03)':'rgba(0,0,0,.05)';
  ctx.lineWidth=.5;
  for(var i=0;i<=GRID;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(W,i*CELL);ctx.stroke();
  }

  /* Slow-time overlay */
  if(slowActive){
    ctx.fillStyle='rgba(0,255,130,0.04)';
    ctx.fillRect(0,0,W,H);
  }

  /* Power-ups */
  powerUps.forEach(function(p){
    var t=TYPES[p.type];
    var cx=p.x*CELL+CELL/2, cy=p.y*CELL+CELL/2;
    var pulse=1+0.15*Math.sin(applePhase*0.12+p.x);
    var r=CELL*0.32*pulse;
    ctx.shadowColor=t.glow; ctx.shadowBlur=14;
    ctx.fillStyle=t.color;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    /* TTL ring */
    ctx.strokeStyle=t.glow;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(cx,cy,CELL*0.42,0,(p.ttl/80)*Math.PI*2);
    ctx.stroke();
  });

  /* Food — BRIGHT glowing apple */
  if(food){
    var t=TYPES[food.type];
    var pulse=1+0.18*Math.sin(applePhase*0.1);
    var cx=food.x*CELL+CELL/2, cy=food.y*CELL+CELL/2;
    var r=CELL*0.36*pulse;

    /* Outer glow ring */
    var grad=ctx.createRadialGradient(cx,cy,r*0.1,cx,cy,r*1.8);
    grad.addColorStop(0,t.glow);
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(cx,cy,r*1.8,0,Math.PI*2);ctx.fill();

    /* Main body */
    ctx.shadowColor=t.glow; ctx.shadowBlur=20;
    var bodyGrad=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.05,cx,cy,r);
    if(food.type==='normal'){
      bodyGrad.addColorStop(0,'#ff7070');
      bodyGrad.addColorStop(0.5,'#ff2020');
      bodyGrad.addColorStop(1,'#cc0000');
    } else if(food.type==='golden'){
      bodyGrad.addColorStop(0,'#fff176');
      bodyGrad.addColorStop(0.5,'#ffd700');
      bodyGrad.addColorStop(1,'#ff8c00');
    } else if(food.type==='blue'){
      bodyGrad.addColorStop(0,'#80dfff');
      bodyGrad.addColorStop(0.5,'#00bfff');
      bodyGrad.addColorStop(1,'#0070cc');
    } else {
      bodyGrad.addColorStop(0,'#80ffb0');
      bodyGrad.addColorStop(0.5,'#00e676');
      bodyGrad.addColorStop(1,'#00a040');
    }
    ctx.fillStyle=bodyGrad;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    /* Shine highlight */
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath();ctx.ellipse(cx-r*0.28,cy-r*0.28,r*0.22,r*0.14,-0.5,0,Math.PI*2);ctx.fill();

    /* Stem */
    ctx.strokeStyle=isDark?'rgba(255,255,255,.5)':'rgba(80,40,0,.6)';
    ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.quadraticCurveTo(cx+r*0.5,cy-r*1.4,cx+r*0.3,cy-r*1.1);ctx.stroke();

    /* Leaf */
    ctx.fillStyle=food.type==='normal'?'#44cc44':'#00ff88';
    ctx.beginPath();ctx.ellipse(cx+r*0.28,cy-r*1.15,r*0.2,r*0.12,0.8,0,Math.PI*2);ctx.fill();

    /* Type icon */
    ctx.font=(CELL*0.5)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    /* only show emoji for non-normal */
    if(food.type!=='normal'){
      ctx.globalAlpha=0.9;
      ctx.fillText(t.label,cx,cy);
      ctx.globalAlpha=1;
    }
  }

  /* Snake body */
  if(snake){
    snake.forEach(function(seg,i){
      var cx=seg.x*CELL+CELL/2, cy=seg.y*CELL+CELL/2;
      var r=CELL*0.42;
      var t=(i/snake.length);

      /* gradient per segment */
      var col;
      if(i===0){
        /* head */
        col=slowActive?'#00ff88':isDark?'#00e5ff':'#0090cc';
        ctx.shadowColor=col; ctx.shadowBlur=10;
      } else {
        var rCh=isDark?0:20, gCh=isDark?180:160, bCh=isDark?80:200;
        var fade=Math.max(0.4,1-t*0.5);
        col='rgba('+Math.round(rCh*fade)+','+Math.round(gCh*fade)+','+Math.round(bCh*fade)+','+fade+')';
      }
      ctx.fillStyle=col;
      var segR=(i===0)?r:r*(1-t*0.25);
      ctx.beginPath();ctx.arc(cx,cy,Math.max(4,segR),0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;

      /* Head: eyes */
      if(i===0){
        var eyeOffset=CELL*0.18;
        var eyeR=CELL*0.1;
        /* direction offset for eyes */
        var ex=dir.x?0:eyeOffset, ey=dir.y?0:eyeOffset;
        [[cx-ex,cy-ey],[cx+ex,cy+ey]].forEach(function(e){
          ctx.fillStyle='#ffffff';
          ctx.beginPath();ctx.arc(e[0]+dir.x*CELL*0.15,e[1]+dir.y*CELL*0.15,eyeR,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#111';
          ctx.beginPath();ctx.arc(e[0]+dir.x*CELL*0.18,e[1]+dir.y*CELL*0.18,eyeR*0.5,0,Math.PI*2);ctx.fill();
        });
      }
    });
  }

  /* Game over overlay */
  if(!alive&&score>0){
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=isDark?'#ff2d78':'#cc0050';
    ctx.font='bold '+(CELL*1.4)+'px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('GAME OVER',W/2,H/2-CELL);
    ctx.fillStyle=isDark?'#ffffff':'#000';
    ctx.font='bold '+(CELL*0.7)+'px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+CELL*0.3);
    ctx.fillText('High: '+highScore,W/2,H/2+CELL*1.2);
  }
  if(!alive&&score===0&&!snake){
    ctx.fillStyle=isDark?'rgba(255,255,255,.12)':'rgba(0,0,0,.1)';
    ctx.font='bold '+(CELL*0.7)+'px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('PRESS START',W/2,H/2);
  }

  applePhase++;
  if(alive) requestAnimationFrame(draw);
}

/* ── Controls ── */
var touchStartX,touchStartY;
document.addEventListener('keydown',function(e){
  var map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
           w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
           W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
  var d=map[e.key];
  if(d&&!(d.x===-dir.x&&d.y===0)&&!(d.y===-dir.y&&d.x===0)){nextDir=d;e.preventDefault();}
  if(e.key===' '){if(!alive)startGame();e.preventDefault();}
});

cv.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-touchStartX;
  var dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){
    var d=dx>0?{x:1,y:0}:{x:-1,y:0};
    if(!(d.x===-dir.x)){nextDir=d;}
  } else {
    var d=dy>0?{x:0,y:1}:{x:0,y:-1};
    if(!(d.y===-dir.y)){nextDir=d;}
  }
},{passive:true});

function dpad(k){
  var map={UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};
  var d=map[k];if(!d)return;
  if(!(d.x===-dir.x&&d.y===0)&&!(d.y===-dir.y&&d.x===0)) nextDir=d;
}

function doShare(){
  var txt='🐍 My Snake score: '+score+' (best: '+highScore+') on Arcade Zone!\nPlay free: '+window.location.origin;
  if(navigator.share){navigator.share({title:'Arcade Zone',text:txt}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){CoinEngine.toast('Copied!','info');});}
}

initCanvas(); draw();
</script>
</body>
</html>
