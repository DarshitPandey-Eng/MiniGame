<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Arcade Zone</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070f">
<script src="supabase.js"></script>
<script src="auth.js"></script>
<style>
* { box-sizing: border-box; }

.login-root {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Animated grid background */
.login-grid {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(color-mix(in srgb,var(--neon-e) 4%,transparent) 1px, transparent 1px),
    linear-gradient(90deg, color-mix(in srgb,var(--neon-e) 4%,transparent) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift { from{background-position:0 0} to{background-position:40px 40px} }

/* Glow orbs */
.login-orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  filter: blur(80px); opacity: 0.12; animation: orbFloat 8s ease-in-out infinite alternate;
}
.login-orb-1 { width:400px;height:400px; background:var(--neon-e); top:-100px; left:-100px; animation-delay:0s; }
.login-orb-2 { width:300px;height:300px; background:var(--neon-b); bottom:-80px; right:-80px; animation-delay:3s; }
.login-orb-3 { width:200px;height:200px; background:var(--neon-c); top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:6s; }
@keyframes orbFloat { from{transform:scale(1) translate(0,0)} to{transform:scale(1.15) translate(20px,-20px)} }

/* Card */
.login-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--card-bg);
  border: 1.5px solid var(--line2);
  border-radius: 22px;
  padding: 36px 32px 32px;
  box-shadow:
    0 32px 80px rgba(0,0,0,0.5),
    0 0 0 1px rgba(255,255,255,.03) inset;
  animation: cardIn .35s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.97)} to{opacity:1;transform:none} }

/* Logo */
.login-logo {
  text-align: center; margin-bottom: 28px;
}
.login-logo-text {
  font-family: var(--font-display);
  font-size: 2.2rem;
  letter-spacing: .12em;
  color: var(--neon-e);
  text-shadow: 0 0 28px color-mix(in srgb,var(--neon-e) 60%,transparent);
  animation: logoGlow 2s ease infinite alternate;
}
@keyframes logoGlow {
  from{text-shadow:0 0 16px color-mix(in srgb,var(--neon-e) 40%,transparent);}
  to  {text-shadow:0 0 40px color-mix(in srgb,var(--neon-e) 80%,transparent);}
}
.login-logo-sub {
  font-family: var(--font-mono); font-size: .56rem;
  color: var(--muted); letter-spacing: .16em; margin-top: 4px;
}

/* Tab switcher */
.login-tabs {
  display: flex; background: var(--bg2);
  border-radius: 10px; padding: 3px; margin-bottom: 24px;
  border: 1px solid var(--line2);
}
.login-tab {
  flex: 1; padding: 8px; border: none; background: transparent;
  font-family: var(--font-mono); font-size: .62rem; font-weight: 700;
  color: var(--muted); cursor: pointer; border-radius: 8px;
  transition: all .14s; letter-spacing: .06em;
}
.login-tab.on {
  background: var(--card-bg);
  color: var(--neon-e);
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}

/* OAuth buttons */
.oauth-btn {
  width: 100%; padding: 13px 16px;
  border-radius: 12px; border: 1.5px solid var(--line2);
  background: var(--bg2); cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-mono); font-size: .72rem; font-weight: 700;
  color: var(--text); transition: all .14s; margin-bottom: 10px;
  -webkit-tap-highlight-color: transparent;
}
.oauth-btn:hover {
  border-color: var(--text2);
  background: var(--card-hover);
  transform: translateY(-1px);
}
.oauth-btn:active { transform: scale(.98); }
.oauth-icon { width: 22px; height: 22px; flex-shrink: 0; border-radius: 4px; }

/* Divider */
.login-or {
  display: flex; align-items: center; gap: 10px;
  margin: 18px 0;
}
.login-or-line { flex: 1; height: 1px; background: var(--line2); }
.login-or-text { font-family: var(--font-mono); font-size: .52rem; color: var(--muted); }

/* Form fields */
.login-field-label {
  font-family: var(--font-mono); font-size: .54rem;
  color: var(--muted); letter-spacing: .1em; margin-bottom: 5px; display: block;
}
.login-field {
  width: 100%; padding: 12px 14px; margin-bottom: 12px;
  background: var(--bg2); border: 1.5px solid var(--line2);
  border-radius: 10px; color: var(--text);
  font-family: var(--font-mono); font-size: .82rem;
  outline: none; transition: border-color .15s;
}
.login-field:focus { border-color: var(--neon-e); }
.login-field::placeholder { color: var(--muted); }

/* Submit button */
.login-submit {
  width: 100%; padding: 14px;
  border: none; border-radius: 12px;
  background: var(--neon-e); color: #000;
  font-family: var(--font-display); font-size: 1.1rem;
  font-weight: 700; letter-spacing: .08em;
  cursor: pointer; transition: all .14s;
  box-shadow: 0 4px 20px color-mix(in srgb,var(--neon-e) 35%,transparent);
  margin-top: 4px;
}
.login-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px color-mix(in srgb,var(--neon-e) 50%,transparent);
}
.login-submit:active { transform: scale(.98); }
.login-submit:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* Guest link */
.login-guest {
  text-align: center; margin-top: 18px;
  font-family: var(--font-mono); font-size: .58rem; color: var(--muted);
}
.login-guest a {
  color: var(--muted); text-decoration: underline;
  text-underline-offset: 3px; cursor: pointer;
  transition: color .12s;
}
.login-guest a:hover { color: var(--text2); }

/* Error / success messages */
.login-msg {
  padding: 10px 14px; border-radius: 9px; margin-bottom: 14px;
  font-family: var(--font-mono); font-size: .64rem; line-height: 1.5;
  display: none;
}
.login-msg.show { display: block; }
.login-msg.err {
  background: color-mix(in srgb,var(--neon-b) 10%,transparent);
  border: 1px solid color-mix(in srgb,var(--neon-b) 35%,transparent);
  color: var(--neon-b);
}
.login-msg.ok {
  background: color-mix(in srgb,var(--neon-d) 10%,transparent);
  border: 1px solid color-mix(in srgb,var(--neon-d) 35%,transparent);
  color: var(--neon-d);
}

/* Loading spinner */
.login-spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,.2); border-top-color: #000;
  border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* Name field (signup only) */
.signup-only { display: none; }
.mode-signup .signup-only { display: block; }

/* Check email notice */
.check-email-view { display: none; text-align: center; }
.check-email-view.show { display: block; }
.check-email-icon { font-size: 3rem; margin: 12px 0; }
.check-email-title { font-family:var(--font-display); font-size:1.6rem; color:var(--neon-d); margin-bottom:8px; }
.check-email-sub { font-family:var(--font-mono); font-size:.64rem; color:var(--text2); line-height:1.7; }
</style>
</head>
<body>

<div class="login-grid"></div>
<div class="login-orb login-orb-1"></div>
<div class="login-orb login-orb-2"></div>
<div class="login-orb login-orb-3"></div>

<div class="login-root">
<div class="login-card" id="login-card">

  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-text">ARCADE ZONE</div>
    <div class="login-logo-sub">YOUR SCORES · YOUR RIVALS · YOUR GLORY</div>
  </div>

  <!-- Check email notice (shown after signup) -->
  <div class="check-email-view" id="check-email">
    <div class="check-email-icon">📧</div>
    <div class="check-email-title">Check your email!</div>
    <div class="check-email-sub" id="check-email-sub">
      We sent a confirmation link. Click it to activate your account, then come back and sign in.
    </div>
    <br>
    <button class="login-submit" style="margin-top:0" onclick="showEmailView(false)">← Back to Sign In</button>
  </div>

  <!-- Main form (hidden when check-email shown) -->
  <div id="main-form">
    <!-- Tabs -->
    <div class="login-tabs">
      <button class="login-tab on" id="tab-in"  onclick="setMode('signin')">SIGN IN</button>
      <button class="login-tab"    id="tab-up"  onclick="setMode('signup')">SIGN UP</button>
    </div>

    <!-- Error/success message -->
    <div class="login-msg" id="login-msg"></div>

    <!-- GitHub OAuth -->
    <button class="oauth-btn" onclick="AZAuth.signInWithGithub()">
      <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text)">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
      </svg>
      Continue with GitHub <span style="font-size:.5rem;opacity:.6;margin-left:auto">FREE</span>
    </button>

    <!-- Magic Link -->
    <button class="oauth-btn" id="magic-btn" onclick="showMagicLink()">
      <span style="font-size:1.3rem">✨</span>
      Send me a magic link
      <span style="font-size:.5rem;opacity:.6;margin-left:auto">no password</span>
    </button>

    <!-- Magic link input (hidden by default) -->
    <div id="magic-panel" style="display:none;margin-bottom:10px;">
      <label class="login-field-label">YOUR EMAIL</label>
      <div style="display:flex;gap:8px;">
        <input class="login-field" id="magic-email" type="email" placeholder="you@example.com"
               style="margin-bottom:0;flex:1" autocomplete="email">
        <button class="login-submit" style="width:auto;padding:12px 18px;margin-top:0;flex-shrink:0" onclick="sendMagicLink()">SEND</button>
      </div>
      <div style="font-family:var(--font-mono);font-size:.52rem;color:var(--muted);margin-top:6px;">
        We'll email you a one-click sign-in link. No password needed.
      </div>
    </div>

    <div class="login-or">
      <div class="login-or-line"></div>
      <div class="login-or-text">OR USE EMAIL + PASSWORD</div>
      <div class="login-or-line"></div>
    </div>

    <!-- Email form -->
    <div id="email-form" class="mode-signin">
      <div class="signup-only">
        <label class="login-field-label">DISPLAY NAME</label>
        <input class="login-field" id="f-name" type="text" placeholder="Your gamer tag" maxlength="24" autocomplete="name">
      </div>

      <label class="login-field-label">EMAIL</label>
      <input class="login-field" id="f-email" type="email" placeholder="you@example.com" autocomplete="email">

      <label class="login-field-label">PASSWORD</label>
      <input class="login-field" id="f-pass"  type="password" placeholder="••••••••" autocomplete="current-password">

      <button class="login-submit" id="submit-btn" onclick="submitForm()">SIGN IN</button>
    </div>

    <!-- Guest link -->
    <div class="login-guest">
      <a onclick="guestPlay()">Continue as guest (no account needed)</a>
    </div>
  </div><!-- /main-form -->

</div><!-- /login-card -->
</div><!-- /login-root -->

<script>
/* ── If already logged in → redirect to hub ── */
if (AZAuth.isLoggedIn()) {
  window.location.replace('index.html');
}

/* ── Handle OAuth callback (hash params from Google/GitHub) ── */
/* Handle OAuth + magic link callbacks (token arrives in URL hash or query params) */
(function() {
  var hashStr  = window.location.hash  || '';
  var searchStr= window.location.search|| '';
  if (hashStr.indexOf('access_token') < 0 && searchStr.indexOf('access_token') < 0) return;
  /* Normalise: if token is in query params, move to hash */
  if (searchStr.indexOf('access_token') >= 0) {
    window.location.hash = searchStr.slice(1);
    window.history.replaceState(null, '', window.location.pathname);
  }
})();

if (window.location.hash && window.location.hash.indexOf('access_token') >= 0) {
  AZAuth.handleCallback().then(function(user) {
    if (user) {
      var name = (user.user_metadata && user.user_metadata.full_name)
                 ? user.user_metadata.full_name
                 : user.email;
      showMsg('✓ Welcome, ' + name + '! Redirecting…', 'ok');
      setTimeout(function(){ window.location.replace('index.html'); }, 1000);
    } else {
      showMsg('Sign-in failed. Please try again.', 'err');
    }
  }).catch(function(err) {
    showMsg(err.message || 'Sign-in failed.', 'err');
  });
}

/* ── Mode: signin / signup ── */
var _mode = 'signin';
function setMode(m) {
  _mode = m;
  document.getElementById('tab-in').classList.toggle('on', m === 'signin');
  document.getElementById('tab-up').classList.toggle('on', m === 'signup');
  var form = document.getElementById('email-form');
  form.className = 'mode-' + m;
  document.getElementById('submit-btn').textContent = m === 'signin' ? 'SIGN IN' : 'CREATE ACCOUNT';
  document.getElementById('f-pass').autocomplete = m === 'signin' ? 'current-password' : 'new-password';
  hideMsg();
}

/* ── Messages ── */
function showMsg(txt, type) {
  var el = document.getElementById('login-msg');
  el.textContent = txt; el.className = 'login-msg show ' + (type || 'err');
}
function hideMsg() {
  document.getElementById('login-msg').className = 'login-msg';
}

/* ── Check email view ── */
function showEmailView(show, email) {
  document.getElementById('check-email').classList.toggle('show', !!show);
  document.getElementById('main-form').style.display = show ? 'none' : '';
  if (email) {
    document.getElementById('check-email-sub').textContent =
      'We sent a confirmation link to ' + email + '. Click it to activate your account, then come back and sign in.';
  }
}

/* ── Submit form ── */
function submitForm() {
  var email = document.getElementById('f-email').value.trim();
  var pass  = document.getElementById('f-pass').value;
  var name  = document.getElementById('f-name') ? document.getElementById('f-name').value.trim() : '';

  if (!email || !email.includes('@')) { showMsg('Enter a valid email address.', 'err'); return; }
  if (pass.length < 6) { showMsg('Password must be at least 6 characters.', 'err'); return; }
  if (_mode === 'signup' && !name) { showMsg('Enter a display name.', 'err'); return; }

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span>' + (_mode === 'signin' ? 'Signing in…' : 'Creating account…');
  hideMsg();

  var promise = _mode === 'signin'
    ? AZAuth.signIn(email, pass)
    : AZAuth.signUp(email, pass, name);

  promise.then(function(data) {
    btn.disabled = false;
    btn.textContent = _mode === 'signin' ? 'SIGN IN' : 'CREATE ACCOUNT';
    if (_mode === 'signup') {
      /* Supabase sends confirmation email — show check-email view */
      showEmailView(true, email);
    } else {
      showMsg('✓ Signed in!', 'ok');
      setTimeout(function(){ window.location.replace('index.html'); }, 800);
    }
  }).catch(function(err) {
    btn.disabled = false;
    btn.textContent = _mode === 'signin' ? 'SIGN IN' : 'CREATE ACCOUNT';
    var msg = err.message || 'Something went wrong';
    /* Make common errors human-friendly */
    if (msg.indexOf('Invalid login') >= 0 || msg.indexOf('invalid_grant') >= 0)
      msg = 'Wrong email or password.';
    else if (msg.indexOf('already registered') >= 0 || msg.indexOf('already been registered') >= 0)
      msg = 'An account with this email already exists. Try signing in instead.';
    else if (msg.indexOf('Email not confirmed') >= 0)
      msg = 'Please confirm your email before signing in.';
    showMsg(msg, 'err');
  });
}

/* ── Guest play ── */
function guestPlay() {
  /* Generate a guest name and ID if none exist */
  if (!localStorage.getItem('az_mp_name')) {
    localStorage.setItem('az_mp_name', 'Guest' + Math.floor(Math.random()*9000+1000));
  }
  window.location.replace('index.html');
}

/* ── Magic link ── */
function showMagicLink() {
  var panel = document.getElementById('magic-panel');
  var isShown = panel.style.display !== 'none';
  panel.style.display = isShown ? 'none' : '';
  if (!isShown) {
    /* Pre-fill email if already typed */
    var emailVal = document.getElementById('f-email').value;
    if (emailVal) document.getElementById('magic-email').value = emailVal;
    document.getElementById('magic-email').focus();
  }
}

function sendMagicLink() {
  var email = document.getElementById('magic-email').value.trim();
  if (!email || !email.includes('@')) {
    showMsg('Enter a valid email address first.', 'err');
    document.getElementById('magic-panel').style.display = '';
    return;
  }
  var btn = document.querySelector('#magic-panel button');
  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span>';
  hideMsg();

  AZAuth.sendMagicLink(email).then(function() {
    btn.disabled = false;
    btn.textContent = 'SEND';
    document.getElementById('magic-panel').style.display = 'none';
    showEmailView(true, email);
    document.getElementById('check-email-sub').textContent =
      'We sent a magic link to ' + email + '. Click it to sign in instantly — no password needed.';
  }).catch(function(err) {
    btn.disabled = false;
    btn.textContent = 'SEND';
    showMsg(err.message || 'Could not send magic link. Try again.', 'err');
  });
}

/* ── Enter key support ── */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var magicOpen = document.getElementById('magic-panel').style.display !== 'none';
    if (magicOpen) sendMagicLink();
    else submitForm();
  }
});
</script>
</body>
</html>
