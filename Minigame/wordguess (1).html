<style>
:root { --accent: var(--neon-a); }

/* ── Page wrap ── */
.wg-page {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; width: 100%; max-width: 420px; padding: 0 12px 32px;
  margin: 0 auto;
}

/* ── Header ── */
.wg-header {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line2); padding-bottom: 8px;
}
.wg-title { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: .1em; color: var(--text); }
.wg-stats { display: flex; gap: 14px; }
.wg-stat .v { font-family: var(--font-display); font-size: 1.1rem; color: var(--neon-a); }
.wg-stat .l { font-family: var(--font-mono); font-size: .42rem; color: var(--muted); letter-spacing: .1em; }
.wg-stat { text-align: center; }

/* ── Message bar ── */
.wg-msg {
  font-family: var(--font-mono); font-size: .75rem; font-weight: 700;
  color: var(--text); text-align: center; min-height: 22px;
  letter-spacing: .04em; padding: 2px 0;
}

/* ── Board ── */
.wg-board {
  display: flex; flex-direction: column; gap: 6px;
  /* perspective for flip animation */
  perspective: 250px;
}
.wg-row { display: flex; gap: 6px; }

.wg-cell {
  width: clamp(52px, 14vw, 64px);
  height: clamp(52px, 14vw, 64px);
  border: 2px solid var(--line2);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 5.5vw, 2rem);
  font-weight: 900;
  color: var(--text);
  background: transparent;
  user-select: none;
  /* for flip */
  transform-style: preserve-3d;
  transition: border-color .05s;
  box-sizing: border-box;
}

/* Typed letter — border becomes bright */
.wg-cell.has-letter { border-color: var(--text2); }

/* Pop when letter typed */
.wg-cell.pop { animation: wgPop .1s ease; }
@keyframes wgPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}

/* Shake on invalid word */
.wg-cell.shake { animation: wgShake .5s ease; }
@keyframes wgShake {
  0%,100% { transform: translateX(0); }
  10%,30%,50%,70%,90% { transform: translateX(-4px); }
  20%,40%,60%,80% { transform: translateX(4px); }
}

/* Flip in (face down) */
.wg-cell.flip-down {
  animation: wgFlipDown .25s ease-in forwards;
}
@keyframes wgFlipDown {
  from { transform: rotateX(0deg); }
  to   { transform: rotateX(-90deg); }
}

/* Flip out (face up with color) */
.wg-cell.flip-up {
  animation: wgFlipUp .25s ease-out forwards;
}
@keyframes wgFlipUp {
  from { transform: rotateX(-90deg); }
  to   { transform: rotateX(0deg); }
}

/* Result colors */
.wg-cell.correct { background: #538d4e; border-color: #538d4e; color: #fff; }
.wg-cell.present { background: #b59f3b; border-color: #b59f3b; color: #fff; }
.wg-cell.absent  { background: #3a3a3c; border-color: #3a3a3c; color: #aaa; }

/* Bounce on win */
.wg-cell.bounce { animation: wgBounce .4s ease forwards; }
@keyframes wgBounce {
  0%,100% { transform: translateY(0); }
  40%     { transform: translateY(-20px); }
  60%     { transform: translateY(-10px); }
}

/* ── On-screen Keyboard ── */
.wg-kbd { display: flex; flex-direction: column; gap: 7px; width: 100%; }
.wg-kb-row { display: flex; gap: 5px; justify-content: center; }

.wg-key {
  height: clamp(46px, 12vw, 58px);
  min-width: clamp(30px, 8vw, 42px);
  flex: 1;
  max-width: clamp(30px, 8vw, 42px);
  border-radius: 5px;
  border: none;
  background: var(--bg2);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: .72rem;
  font-weight: 800;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, color .2s, transform .08s;
  padding: 0 3px;
  border: 1px solid color-mix(in srgb, var(--text) 12%, transparent);
}
.wg-key.wide { max-width: 66px; font-size: .6rem; }
.wg-key:active { transform: scale(.88); }

/* Keyboard colors */
.wg-key.correct { background: #538d4e; color: #fff; border-color: #538d4e; }
.wg-key.present { background: #b59f3b; color: #fff; border-color: #b59f3b; }
.wg-key.absent  { background: #3a3a3c; color: #777; border-color: #3a3a3c; }

/* ── Legend ── */
.wg-legend {
  display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  font-family: var(--font-mono); font-size: .56rem; color: var(--muted);
}
.wg-legend span { display: flex; align-items: center; gap: 4px; }
.wg-legend-box {
  width: 14px; height: 14px; border-radius: 3px;
  display: inline-block; flex-shrink: 0;
}

/* ── Toast (in-game notification) ── */
.wg-toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg1);
  font-family: var(--font-mono); font-size: .74rem; font-weight: 700;
  padding: 9px 20px; border-radius: 8px; z-index: 500;
  pointer-events: none;
  animation: wgToastIn .15s ease, wgToastOut .3s ease 1.2s forwards;
}
@keyframes wgToastIn  { from { opacity:0; transform:translateX(-50%) translateY(-8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes wgToastOut { to   { opacity:0; transform:translateX(-50%) translateY(-8px); } }
</style>
</head>

<script>
/* ── Theme ── */
(function(){
  var tb = document.getElementById('tb');
  function s(){ tb.textContent = CoinEngine.getTheme()==='dark' ? '☀️' : '🌙'; }
  tb.addEventListener('click', function(){ CoinEngine.toggleTheme(); s(); }); s();
  document.addEventListener('az:balance', function(e){
    document.querySelectorAll('.az-bal').forEach(function(el){ el.textContent = e.detail; });
  });
})();

/* ══ WORD LIST (200 common 5-letter words) ══ */
var WORDS = [
  'ABOUT','ABOVE','ABUSE','ACTOR','ACUTE','ADMIT','ADOPT','ADULT','AFTER','AGAIN',
  'AGREE','AHEAD','ALARM','ALERT','ALIKE','ALIVE','ALONG','ALTER','ANGEL','ANGER',
  'ANGLE','ANKLE','ANNEX','APART','APPLE','APPLY','ARENA','ARGUE','ARISE','ASIDE',
  'ASKED','ATLAS','AUDIO','AUDIT','AVOID','AWAKE','AWARD','AWARE','BADLY','BAKER',
  'BEACH','BEGAN','BEGIN','BEING','BELOW','BELOW','BENCH','BIBLE','BLACK','BLADE',
  'BLAME','BLAND','BLANK','BLAST','BLEND','BLESS','BLIND','BLOOD','BLOWN','BOARD',
  'BOOST','BOUND','BRAIN','BRAVE','BREAD','BREAK','BREED','BRICK','BRIDE','BRIEF',
  'BRING','BROKE','BROOK','BROWN','BUILD','BUILT','BURNS','BURST','CABIN','CANDY',
  'CARRY','CATCH','CAUSE','CHAIN','CHAIR','CHAOS','CHARM','CHASE','CHEAP','CHEAT',
  'CHECK','CHEEK','CHESS','CHEST','CHIEF','CHILD','CHINA','CIVIC','CIVIL','CLAIM',
  'CLASS','CLEAN','CLEAR','CLERK','CLICK','CLIFF','CLIMB','CLOCK','CLOSE','CLOUD',
  'COAST','COUNT','COURT','COVER','CRACK','CRAFT','CRASH','CRAZY','CREAM','CREEK',
  'CRIME','CROSS','CROWD','CROWN','CRUSH','CURVE','CYCLE','DAILY','DANCE','DEALT',
  'DEBUT','DELAY','DEPTH','DIRTY','DOUBT','DRAFT','DRAIN','DRAKE','DRAMA','DRANK',
  'DRAWN','DREAM','DRIED','DRILL','DRINK','DRIVE','DROVE','DROWN','DWARF','DYING',
  'EAGER','EAGLE','EARLY','EARTH','EIGHT','ELITE','EMAIL','EMPTY','ENEMY','ENJOY',
  'ENTER','ENTRY','EQUAL','ESSAY','EVERY','EXACT','EXIST','EXTRA','FABLE','FACED',
  'FAITH','FALSE','FANCY','FAULT','FEAST','FENCE','FEVER','FIELD','FIFTH','FIFTY',
  'FIGHT','FINAL','FIRST','FIXED','FLAME','FLASH','FLESH','FLIES','FLOOD','FLOOR',
  'FLOUR','FLUID','FOCUS','FORCE','FORGE','FORTH','FOUND','FRAME','FRANK','FRAUD',
];

/* Larger list for valid guesses (won't be targets but accepted as guesses) */
var VALID_EXTRA = [
  'BLAZE','BLEND','BLISS','BLOCK','BLOKE','BLUES','BLUNT','BLURB','BOXER','BRACE',
  'BRAND','BRASH','BRAWL','BRAWN','BRISK','BROAD','BROOD','BROOM','BRUSH','BUDDY',
  'BULGE','BUMPY','BUNCH','BUYER','CACHE','CAMEL','CAMEO','CARDS','CEDAR','CHALK',
  'CLING','CLONE','CLOTH','CLOWN','COMET','COMIC','CORAL','CRACK','CRATE','CRAWL',
  'CRIMP','CRISP','DRAFT','DRAPE','DRAWL','DROVE','DRYER','DUSKY','DUSTY','DWELT',
  'EASEL','ELBOW','EPOCH','EVOKE','EXPEL','FLAIR','FLANK','FLASK','FLICK','FLOCK',
  'FLORA','FLOSS','FLUSH','FORCE','FRAIL','FREAK','FREED','FRESH','FRILL','FRISK',
  'FROST','GAMER','GLASS','GLOBE','GLOOM','GRACE','GREET','HAVEN','HORSE','HOVER',
  'HYPER','IDEAL','INDEX','INPUT','IRONY','IVORY','JAZZY','JEWEL','JOKER','JOINT',
  'JUICE','KARMA','KNIFE','KNEEL','KNACK','KINGS','LASER','LATCH','LIGHT','LUCKY',
  'LUNAR','MAGIC','MANGO','MANOR','MARSH','MIMIC','MUSIC','NERVE','NICHE','NIGHT',
  'NINJA','NOVEL','NUDGE','OCEAN','OZONE','PASTA','PILOT','PIXEL','PLACE','PLAIN',
  'PLANT','POWER','PRIDE','PRISM','QUEST','RADAR','RAISE','RALLY','RAVEN','REIGN',
  'RIVER','SCARF','SHINE','SNACK','SOLAR','SPEED','STAND','STORM','STORM','SUGAR',
  'THANK','THORN','TIGER','TORCH','TOWER','TREND','TRIBE','ULTRA','UNDER','UNITY',
  'USHER','VAPOR','VENUE','VIOLA','VIVID','WATCH','WHALE','WINDY','WOVEN','WRIST',
  'XEROX','YACHT','YIELD','ZEBRA','AMBER','AZURE','BERRY','BLOOM','CEDAR','CHESS',
  'DAISY','DELTA','EMBER','EPOCH','EXERT','FLUTE','GLOBE','HONEY','IVORY','LOGIC',
  'LUNAR','MANOR','MORAL','MOUNT','MOUSE','NOVEL','OAKEN','PARSE','PIXEL','PLANE',
  'PROUD','QUEEN','QUIET','REBEL','RIVAL','SCORE','SENSE','SHADE','SHAPE','SHARE',
];

var ALL_VALID = (function(){
  var v = WORDS.slice();
  VALID_EXTRA.forEach(function(w){ if(v.indexOf(w)<0) v.push(w); });
  return v;
})();

/* ══ GAME STATE ══ */
var NUM_ROWS = 6;
var NUM_COLS = 5;
var target   = '';
var board    = []; /* board[r][c] = {letter, state} state: ''|'correct'|'present'|'absent' */
var curRow   = 0;
var curCol   = 0;
var gameOver = false;
var keyColors= {}; /* letter -> state */

/* Stats */
var played = 0, wins = 0, streak = 0;
(function(){
  try {
    var s = JSON.parse(localStorage.getItem('wg_stats')||'{}');
    played = s.played||0; wins = s.wins||0; streak = s.streak||0;
  } catch(_){}
  document.getElementById('s-played').textContent = played;
  document.getElementById('s-wins').textContent   = wins;
  document.getElementById('s-streak').textContent = streak;
})();

function saveStats(){
  try { localStorage.setItem('wg_stats', JSON.stringify({played:played,wins:wins,streak:streak})); } catch(_){}
  document.getElementById('s-played').textContent = played;
  document.getElementById('s-wins').textContent   = wins;
  document.getElementById('s-streak').textContent = streak;
}

/* ── Multiplayer ── */
var _MP     = AZMulti.parseParams();
var _mpSeed = _MP.seed || null;
var _mpRoom = _MP.room || null;
var _mpPid  = _MP.pid  || 1;
var _mpRng  = _mpSeed ? AZMulti.seededRng(_mpSeed) : null;
var _stopPoll = null;

/* ══ BUILD UI ══ */

function buildBoard() {
  var el = document.getElementById('wg-board');
  el.innerHTML = '';
  board = [];
  for (var r = 0; r < NUM_ROWS; r++) {
    board[r] = [];
    var rowEl = document.createElement('div');
    rowEl.className = 'wg-row';
    rowEl.id = 'row-' + r;
    for (var c = 0; c < NUM_COLS; c++) {
      board[r][c] = { letter: '', state: '' };
      var cell = document.createElement('div');
      cell.className = 'wg-cell';
      cell.id = 'cell-' + r + '-' + c;
      rowEl.appendChild(cell);
    }
    el.appendChild(rowEl);
  }
}

function buildKeyboard() {
  var el = document.getElementById('wg-kbd');
  el.innerHTML = '';
  var rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  rows.forEach(function(keyRow) {
    var rowEl = document.createElement('div');
    rowEl.className = 'wg-kb-row';
    keyRow.forEach(function(key) {
      var btn = document.createElement('button');
      btn.className = 'wg-key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.id = 'key-' + key;
      if (keyColors[key]) btn.classList.add(keyColors[key]);
      btn.addEventListener('click', function(){ handleKey(key); });
      rowEl.appendChild(btn);
    });
    el.appendChild(rowEl);
  });
}

function getCell(r, c){ return document.getElementById('cell-'+r+'-'+c); }
function getKey(k){ return document.getElementById('key-'+k); }

/* Update a single cell's display */
function renderCell(r, c){
  var cell = getCell(r, c);
  if (!cell) return;
  var d = board[r][c];
  cell.textContent = d.letter;
  cell.className = 'wg-cell' + (d.state ? ' '+d.state : (d.letter ? ' has-letter' : ''));
}

/* ══ GAME LOGIC ══ */

function newGame(){
  target = _mpRng
    ? WORDS[Math.floor(_mpRng() * WORDS.length)]
    : WORDS[Math.floor(Math.random() * WORDS.length)];

  curRow = 0; curCol = 0; gameOver = false; keyColors = {};
  document.getElementById('wg-msg').textContent = '';
  document.getElementById('share-btn').style.display = 'none';

  buildBoard();
  buildKeyboard();
  SoundEngine.play('start');

  if (_mpRoom && _mpRoom !== 'OFFLINE' && AZMulti.isConfigured()) {
    _stopPoll = AZMulti.pollRoom(_mpRoom, function(room){
      /* show opponent progress */
    });
  }
}

function handleKey(key){
  if (gameOver) return;

  if (key === '⌫' || key === 'Backspace'){
    deleteLetter(); return;
  }
  if (key === 'ENTER' || key === 'Enter'){
    submitRow(); return;
  }
  if (/^[A-Za-z]$/.test(key)){
    typeLetter(key.toUpperCase());
  }
}

function typeLetter(letter){
  if (curCol >= NUM_COLS) return;
  board[curRow][curCol].letter = letter;
  board[curRow][curCol].state  = '';
  renderCell(curRow, curCol);
  /* pop animation */
  var cell = getCell(curRow, curCol);
  if (cell){ cell.classList.remove('pop'); void cell.offsetWidth; cell.classList.add('pop'); }
  SoundEngine.play('key');
  curCol++;
}

function deleteLetter(){
  if (curCol <= 0) return;
  curCol--;
  board[curRow][curCol].letter = '';
  board[curRow][curCol].state  = '';
  renderCell(curRow, curCol);
}

function submitRow(){
  if (curCol < NUM_COLS){
    showMsg('Not enough letters', 'error');
    shakeCurRow();
    return;
  }

  var guess = '';
  for (var c = 0; c < NUM_COLS; c++) guess += board[curRow][c].letter;

  if (ALL_VALID.indexOf(guess) < 0){
    showMsg('Not in word list', 'error');
    shakeCurRow();
    return;
  }

  /* Evaluate */
  var result = evaluate(guess, target);

  /* Store results in board data */
  for (var c = 0; c < NUM_COLS; c++){
    board[curRow][c].state = result[c];
  }

  /* Animate flip row then update colors */
  var r = curRow;
  flipRow(r, result, function(){
    /* Update keyboard colors */
    for (var c = 0; c < NUM_COLS; c++){
      var letter = board[r][c].letter;
      var res    = result[c];
      var prev   = keyColors[letter];
      if (res === 'correct')                             keyColors[letter] = 'correct';
      else if (res === 'present' && prev !== 'correct') keyColors[letter] = 'present';
      else if (!prev)                                    keyColors[letter] = 'absent';

      var kEl = getKey(letter);
      if (kEl){
        kEl.className = 'wg-key';
        if (keyColors[letter]) kEl.classList.add(keyColors[letter]);
      }
    }

    var won = result.every(function(s){ return s === 'correct'; });
    curRow++;

    if (won){
      gameOver = true;
      var rowNum = curRow; /* number of guesses used */
      bounceRow(rowNum - 1);
      var msgs = ['Genius! 🧠','Magnificent! 🌟','Impressive! 🎯','Splendid! ✨','Great! 👍','Phew! 😅'];
      setTimeout(function(){
        showMsg(msgs[rowNum-1] || 'Nice! 🎉', 'win');
      }, 400);
      /* Stats & coins */
      played++; wins++; streak++;
      saveStats();
      var reward = Math.max(5, (7 - rowNum) * 5);
      CoinEngine.add(reward, 'Word Guess — solved in ' + rowNum, '📝');
      CoinEngine.recordGame('wordguess', reward, true, { tries: rowNum });
      setTimeout(function(){ CoinEngine.toast('+' + reward + ' 🪙  Solved in ' + rowNum + '!','coin'); }, 600);
      SoundEngine.play('success');
      document.getElementById('share-btn').style.display = 'inline-flex';
      /* Multiplayer */
      mpDone(rowNum, true);

    } else if (curRow >= NUM_ROWS){
      gameOver = true;
      played++; streak = 0;
      saveStats();
      CoinEngine.recordGame('wordguess', 0, false, {});
      setTimeout(function(){
        showMsg('The word was ' + target, 'error');
      }, 300);
      SoundEngine.play('gameover');
      document.getElementById('share-btn').style.display = 'inline-flex';
      mpDone(7, false);

    } else {
      curCol = 0;
    }
  });
}

/* ── Evaluate guess ── */
function evaluate(guess, tgt){
  var result = ['absent','absent','absent','absent','absent'];
  var tArr   = tgt.split('');
  var used   = [false,false,false,false,false];
  /* Pass 1: correct positions */
  for (var i = 0; i < 5; i++){
    if (guess[i] === tArr[i]){ result[i] = 'correct'; used[i] = true; }
  }
  /* Pass 2: present (right letter, wrong spot) */
  for (var i = 0; i < 5; i++){
    if (result[i] === 'correct') continue;
    for (var j = 0; j < 5; j++){
      if (!used[j] && guess[i] === tArr[j]){ result[i] = 'present'; used[j] = true; break; }
    }
  }
  return result;
}

/* ── Flip animation: cell flips down (face hidden), color applied, flips back up ── */
function flipRow(r, result, callback){
  var FLIP_DOWN = 250;   /* ms for face-down phase */
  var FLIP_UP   = 250;   /* ms for face-up phase */
  var DELAY     = 300;   /* ms stagger between cells */

  for (var c = 0; c < NUM_COLS; c++){
    (function(col){
      var cell   = getCell(r, col);
      var color  = result[col];
      var startT = col * DELAY;

      setTimeout(function(){
        /* Phase 1: flip to face-down */
        cell.classList.remove('pop','has-letter');
        cell.classList.add('flip-down');

        setTimeout(function(){
          /* Midpoint: cell is hidden — apply color now */
          cell.classList.remove('flip-down');
          cell.classList.add(color);
          cell.classList.add('flip-up');

          setTimeout(function(){
            /* Done flipping */
            cell.classList.remove('flip-up');
          }, FLIP_UP);

        }, FLIP_DOWN);
      }, startT);
    })(c);
  }

  /* Fire callback after last cell fully visible */
  var totalTime = (NUM_COLS - 1) * DELAY + FLIP_DOWN + FLIP_UP + 50;
  setTimeout(callback, totalTime);
}

/* ── Shake current row (invalid word) ── */
function shakeCurRow(){
  for (var c = 0; c < NUM_COLS; c++){
    (function(col){
      var cell = getCell(curRow, col);
      if (!cell) return;
      cell.classList.remove('shake');
      void cell.offsetWidth;
      cell.classList.add('shake');
    })(c);
  }
  SoundEngine.play('error');
}

/* ── Bounce row on win ── */
function bounceRow(r){
  for (var c = 0; c < NUM_COLS; c++){
    (function(col){
      setTimeout(function(){
        var cell = getCell(r, col);
        if (!cell) return;
        cell.classList.remove('bounce');
        void cell.offsetWidth;
        cell.classList.add('bounce');
      }, col * 100);
    })(c);
  }
}

/* ── Message display ── */
function showMsg(txt, type){
  var el = document.getElementById('wg-msg');
  el.textContent = txt;
  el.style.color = type === 'error' ? 'var(--neon-b)' : type === 'win' ? 'var(--neon-d)' : 'var(--text)';
  /* auto-clear errors */
  if (type === 'error'){
    clearTimeout(showMsg._t);
    showMsg._t = setTimeout(function(){ if (!gameOver) el.textContent = ''; }, 1500);
  }
}
showMsg._t = null;

/* ── In-game toast (for quick messages) ── */
function wgToast(txt){
  var existing = document.querySelector('.wg-toast');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'wg-toast';
  el.textContent = txt;
  document.body.appendChild(el);
  setTimeout(function(){ if (el.parentNode) el.remove(); }, 1600);
}

/* ── Share ── */
function doShare(){
  var grid = '';
  for (var r = 0; r < curRow; r++){
    for (var c = 0; c < NUM_COLS; c++){
      var s = board[r][c].state;
      grid += s==='correct' ? '🟩' : s==='present' ? '🟨' : '⬛';
    }
    grid += '\n';
  }
  var tries = wins > 0 ? (curRow > 0 && board[curRow-1] && board[curRow-1][4].state==='correct' ? curRow : 'X') : 'X';
  var txt = 'Word Guess ' + tries + '/6\n\n' + grid + '\nPlay: ' + location.origin + '/wordguess.html';
  if (navigator.share) {
    navigator.share({ title: 'Word Guess', text: txt }).catch(function(){});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function(){ wgToast('Copied to clipboard!'); });
  } else {
    wgToast('Share not supported on this browser');
  }
}

/* ── Physical keyboard ── */
document.addEventListener('keydown', function(e){
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  handleKey(e.key);
});

/* ══ MULTIPLAYER ══ */
function mpDone(score, won){
  if (_stopPoll){ _stopPoll(); _stopPoll = null; }
  var name = localStorage.getItem('az_mp_name') || 'Player';
  AZMulti.submitScore('wordguess', won ? (7-score) : 0, name, { tries: score, word: target });
  if (_mpRoom && _mpRoom !== 'OFFLINE' && AZMulti.isConfigured()){
    AZMulti.markDoneAndCheck(_mpRoom, _mpPid, score, 'wordguess').then(function(result){
      if (result){ window.location.href = AZMulti.resultUrl(result, _mpPid); }
      else { window.location.href = 'result.html?room=' + encodeURIComponent(_mpRoom) + '&game=wordguess&me=' + _mpPid; }
    }).catch(function(){});
  }
}

/* ══ START ══ */
newGame();
</script>
