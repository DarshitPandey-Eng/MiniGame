<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match — Arcade Zone</title>
<link rel="stylesheet" href="style.css">
<script src="coins.js"></script>
<script src="sound.js"></script>
<script src="game-ui.js"></script>
<style>
:root{--accent:var(--neon-e);}
.mem-board{display:grid;gap:10px;padding:14px;background:var(--card-bg);border:1px solid var(--line2);border-radius:var(--radius);}
.card{aspect-ratio:1;cursor:pointer;perspective:700px;-webkit-tap-highlight-color:transparent;}
.card-i{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .36s ease;border-radius:8px;}
.card.flipped .card-i,.card.matched .card-i{transform:rotateY(180deg);}
.card-f,.card-b{position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;display:flex;align-items:center;justify-content:center;border:2px solid;}
.card-b{background:var(--bg2);border-color:var(--dim);font-family:var(--font-mono);font-size:.8rem;color:var(--dim);}
.card-f{background:var(--bg0);border-color:var(--neon-e);transform:rotateY(180deg);font-size:2rem;}
.card.matched .card-f{border-color:var(--neon-d);box-shadow:0 0 14px var(--neon-d);}
.st-row{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.st-item .v{font-family:var(--font-display);font-size:1.9rem;letter-spacing:.04em;color:var(--neon-e);}
.st-item .l{font-family:var(--font-mono);font-size:.52rem;color:var(--muted);letter-spacing:.1em;}
</style>
</head>
<body>
<nav class="nav" id="main-nav"></nav>
<div class="page" style="gap:14px;">
  <div class="st-row">
    <div class="st-item"><div class="v" id="t-pairs">0/8</div><div class="l">PAIRS</div></div>
    <div class="st-item"><div class="v" id="t-moves">0</div><div class="l">MOVES</div></div>
    <div class="st-item"><div class="v" id="t-time">0s</div><div class="l">TIME</div></div>
  </div>
  <div class="mem-board" id="board" style="grid-template-columns:repeat(4,72px)"></div>
  <div class="btn-row">
    <button class="btn filled" style="--c:var(--neon-e)" onclick="startGame(4)">4×4 (🪙5)</button>
    <button class="btn" style="--c:var(--neon-e)" onclick="startGame(5)">5×4 (🪙5)</button>
    <a class="btn" href="index.html">HUB</a>
  </div>
  <div class="fover hidden" id="ov-win" style="position:fixed;inset:0;background:var(--modal-bg);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:500;text-align:center;padding:28px;">
    <div class="ov-title" style="color:var(--neon-d)">YOU WIN! 🎉</div>
    <div class="ov-sub">Completed in <b id="wm">0</b> moves, <b id="wt">0s</b>!<br>Earned: <b id="w-earned">0</b> 🪙</div>
    <div class="btn-row">
      <button class="btn filled" style="--c:var(--neon-e)" id="replay-btn">PLAY AGAIN</button>
      <a class="btn" href="index.html">HUB</a>
    </div>
  </div>
</div>
<script>
(function(){
  var n=document.getElementById('main-nav');
  n.innerHTML='<a class="nav-back" href="index.html">← Hub</a><div class="nav-sep"></div>'+
    '<div class="nav-title"><span class="dot" style="background:var(--neon-e);box-shadow:0 0 8px var(--neon-e)"></span>MEMORY MATCH</div>'+
    '<div class="score-pill"><span class="val" id="sc-mv">0</span><span class="lbl">MOVES</span></div>'+
    '<a class="coin-nav" href="wallet.html"><span>🪙</span><span class="az-bal">0</span></a>'+
    '<button class="theme-btn" id="tb">☀️</button>';
  var tb=document.getElementById('tb');
  function s(){tb.textContent=CoinEngine.getTheme()==='dark'?'☀️':'🌙';}
  tb.addEventListener('click',function(){CoinEngine.toggleTheme();s();}); s();
  document.addEventListener('az:balance',function(e){document.querySelectorAll('.az-bal').forEach(function(el){el.textContent=e.detail;});});
})();

var POOL=['🦊','🐸','🦋','🐙','🌈','🎸','🍕','🚀','🐲','🦄'];
var flipped=[],matched=0,moves=0,locked=false;
var t0,tmr,lastCols=4,pairCount=8;

document.getElementById('replay-btn').addEventListener('click',function(){startGame(lastCols);});

function startGame(cols){
  if(!CoinEngine.spend(5)){CoinEngine.toast('Not enough coins!','warn');return;}
  CoinEngine.addHistory('🃏','Memory Match — started',-5);
  lastCols=cols||4;
  document.getElementById('ov-win').classList.add('hidden');
  pairCount=(lastCols*4)/2;
  flipped=[];matched=0;moves=0;locked=false;
  clearInterval(tmr);t0=Date.now();
  tmr=setInterval(function(){document.getElementById('t-time').textContent=Math.floor((Date.now()-t0)/1000)+'s';},500);
  updateStats();

  var board=document.getElementById('board');
  board.style.gridTemplateColumns='repeat('+lastCols+',72px)';
  board.innerHTML='';

  var emojis=POOL.slice(0,pairCount);
  var deck=emojis.concat(emojis).sort(function(){return Math.random()-.5;});
  deck.forEach(function(em){
    var card=document.createElement('div');card.className='card';card.dataset.em=em;
    card.innerHTML='<div class="card-i"><div class="card-b">?</div><div class="card-f">'+em+'</div></div>';
    card.addEventListener('click',function(){flip(card);});
    board.appendChild(card);
  });
}

function flip(card){
  if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){moves++;updateStats();locked=true;setTimeout(check,520);}
}

function check(){
  var a=flipped[0],b=flipped[1];
  if(a.dataset.em===b.dataset.em){
    a.classList.add('matched');b.classList.add('matched');matched++;
    if(matched===pairCount)win();
  } else {
    a.classList.remove('flipped');b.classList.remove('flipped');
  }
  flipped=[];locked=false;updateStats();
}

function win(){
  clearInterval(tmr);
  var secs=Math.floor((Date.now()-t0)/1000);
  var earned=20+Math.max(0,40-moves); /* bonus for fewer moves */
  CoinEngine.add(earned,'Memory Match — win','🃏');
  CoinEngine.recordGame('memory',moves,true,{moves:moves,earned:earned});
  document.getElementById('wm').textContent=moves;
  document.getElementById('wt').textContent=secs+'s';
  document.getElementById('w-earned').textContent=earned;
  document.getElementById('ov-win').classList.remove('hidden');
}

function updateStats(){
  document.getElementById('t-pairs').textContent=matched+'/'+pairCount;
  document.getElementById('t-moves').textContent=moves;
  document.getElementById('sc-mv').textContent=moves;
}

startGame(4);
</script>
</body>
</html>
