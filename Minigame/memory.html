<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match — Arcade Zone</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070f">
<script src="supabase.js"></script>
<script src="coins.js"></script>
<script src="sound.js"></script>
<script src="game-ui.js"></script>
<style>
:root { --acc: var(--neon-e); }

/* ── page wrapper ── */
.mem-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; width: 100%; padding: 0 10px 80px; box-sizing: border-box;
}

/* ── HUD row ── */
.mem-hud {
  display: flex; gap: 6px; width: 100%; max-width: 520px;
  justify-content: center;
}
.mh-box {
  flex: 1; background: var(--card-bg); border: 1px solid var(--line2);
  border-radius: 10px; padding: 7px 6px; text-align: center;
  transition: border-color .25s, background .25s;
}
.mh-box.flash { border-color: var(--neon-f); background: color-mix(in srgb,var(--neon-f) 10%,var(--card-bg)); }
.mh-v {
  font-family: var(--font-display); font-size: clamp(1.25rem,5vw,1.65rem);
  color: var(--neon-e); line-height: 1; letter-spacing: .04em;
}
.mh-l {
  font-family: var(--font-mono); font-size: .44rem;
  color: var(--muted); letter-spacing: .12em; margin-top: 3px;
}

/* ── combo banner ── */
.mem-combo {
  font-family: var(--font-display); letter-spacing: .1em;
  font-size: clamp(1.1rem,4vw,1.7rem); color: var(--neon-f);
  text-align: center; height: 1.8rem; line-height: 1.8rem;
  pointer-events: none; overflow: hidden;
  text-shadow: 0 0 22px color-mix(in srgb,var(--neon-f) 70%,transparent);
}
@keyframes comboPop {
  0%  { opacity:0; transform: scale(.55) translateY(8px); }
  55% { opacity:1; transform: scale(1.1)  translateY(0);  }
  100%{ opacity:1; transform: scale(1)    translateY(0);  }
}
.mem-combo.show { animation: comboPop .45s cubic-bezier(.34,1.56,.64,1) forwards; }

/* ── difficulty pills ── */
.mem-diffs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.md-pill {
  font-family: var(--font-mono); font-size: .58rem; font-weight: 700;
  padding: 6px 13px; border-radius: 20px;
  border: 1.5px solid var(--line2); background: var(--bg2);
  color: var(--muted); cursor: pointer; transition: all .14s;
  white-space: nowrap;
}
.md-pill.on {
  border-color: var(--neon-e); color: var(--neon-e);
  background: color-mix(in srgb,var(--neon-e) 12%,transparent);
  box-shadow: 0 0 14px color-mix(in srgb,var(--neon-e) 20%,transparent);
}
.md-sub { font-size: .5rem; opacity: .65; margin-left: 4px; }

/* ── best-times strip ── */
.mem-bests { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; min-height: 1.4rem; }
.mb-chip {
  font-family: var(--font-mono); font-size: .54rem;
  background: var(--bg2); border: 1px solid var(--line2);
  border-radius: 6px; padding: 3px 9px; color: var(--muted);
  display: flex; align-items: center; gap: 4px;
}
.mb-chip b { color: var(--neon-c); }

/* ── board container ── */
.mem-board-shell {
  background: var(--card-bg); border: 1.5px solid var(--line2);
  border-radius: 14px; padding: 12px;
  box-shadow: 0 6px 36px rgba(0,0,0,.28);
}
@media(min-width:640px){ .mem-board-shell { padding: 16px; } }

/* ── grid ── */
#mem-board { display: grid; }

/* ── individual card ── */
.mc {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  /* hover lift only on devices that support hover properly */
}
@media(hover:hover){
  .mc:not(.mc-matched):not(.mc-up):hover { transform: translateY(-3px) scale(1.04); }
}

/* The inner flipper */
.mc-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  border-radius: 9px;
  /* flip transition */
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
/* flipped states */
.mc.mc-up     .mc-inner { transform: rotateY(180deg); }
.mc.mc-matched .mc-inner { transform: rotateY(180deg); }
.mc.mc-peek   .mc-inner { transform: rotateY(180deg); }

/* both faces */
.mc-back, .mc-front {
  position: absolute; inset: 0; border-radius: 9px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid;
}

/* back face */
.mc-back {
  background: var(--bg2); border-color: var(--line2); overflow: hidden;
}
.mc-back::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 35% 30%, color-mix(in srgb,var(--neon-e) 25%,transparent) 0%, transparent 60%),
    repeating-linear-gradient(45deg, transparent, transparent 7px,
      color-mix(in srgb,var(--neon-e) 7%,transparent) 7px,
      color-mix(in srgb,var(--neon-e) 7%,transparent) 8px);
}
.mc-back-q {
  position: relative; z-index: 1;
  font-family: var(--font-mono); font-weight: 700;
  color: color-mix(in srgb,var(--neon-e) 38%,transparent);
}

/* front face */
.mc-front {
  background: var(--bg1);
  border-color: var(--neon-e);
  transform: rotateY(180deg);
}
.mc-front .mc-em {
  line-height: 1; display: block;
  filter: drop-shadow(0 2px 8px color-mix(in srgb,var(--neon-e) 45%,transparent));
}

/* matched glow */
.mc.mc-matched .mc-front {
  border-color: var(--neon-d);
  background: color-mix(in srgb,var(--neon-d) 10%,var(--bg1));
  box-shadow: inset 0 0 16px color-mix(in srgb,var(--neon-d) 22%,transparent);
}
.mc.mc-matched .mc-em {
  filter: drop-shadow(0 0 10px color-mix(in srgb,var(--neon-d) 80%,transparent));
}
@keyframes matchPop {
  0%  { transform: rotateY(180deg) scale(1); }
  50% { transform: rotateY(180deg) scale(1.15); }
  100%{ transform: rotateY(180deg) scale(1); }
}
.mc.mc-matched .mc-inner { animation: matchPop .35s ease; }

/* wrong shake — keeps face visible, shakes, then JS removes mc-up */
@keyframes wrongShake {
  0%   { transform: rotateY(180deg) translateX(0px);  }
  18%  { transform: rotateY(180deg) translateX(-8px) rotate(-3deg); }
  36%  { transform: rotateY(180deg) translateX( 8px) rotate( 3deg); }
  54%  { transform: rotateY(180deg) translateX(-6px); }
  72%  { transform: rotateY(180deg) translateX( 5px); }
  100% { transform: rotateY(180deg) translateX(0px);  }
}
.mc.mc-wrong .mc-inner {
  animation: wrongShake .42s ease forwards;
  border-color: color-mix(in srgb,#ff2d78 60%,transparent);
}
.mc.mc-wrong .mc-front {
  border-color: #ff2d78;
  background: color-mix(in srgb,#ff2d78 12%,var(--bg1));
}

/* ── power-up bar ── */
.mem-pups { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
.pu {
  font-family: var(--font-mono); font-size: .59rem; font-weight: 700;
  padding: 6px 12px; border-radius: 9px;
  border: 1.5px solid var(--line2); background: var(--bg2);
  color: var(--text2); cursor: pointer; transition: all .12s;
  display: flex; align-items: center; gap: 5px;
}
.pu:hover { border-color: var(--neon-c); color: var(--neon-c); }
.pu .pc { color: var(--neon-c); font-size: .52rem; }

/* ── win overlay ── */
.mem-win {
  position: fixed; inset: 0; z-index: 700;
  background: var(--modal-bg); backdrop-filter: blur(16px);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 14px; padding: 24px; text-align: center;
  animation: ovShow .28s ease;
}
.mem-win.hidden { display: none; }
@keyframes ovShow { from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)} }

.mw-title {
  font-family: var(--font-display); font-size: clamp(3rem,10vw,5.5rem);
  letter-spacing: .08em; color: var(--neon-d);
  animation: mwGlow 1.5s ease infinite alternate;
}
@keyframes mwGlow {
  from { text-shadow: 0 0 18px color-mix(in srgb,var(--neon-d) 40%,transparent); }
  to   { text-shadow: 0 0 55px color-mix(in srgb,var(--neon-d) 90%,transparent); }
}
.mw-stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.mw-st {
  background: var(--card-bg); border: 1px solid var(--line2);
  border-radius: 11px; padding: 11px 16px; min-width: 76px;
}
.mw-st .mv { font-family:var(--font-display); font-size:1.9rem; color:var(--neon-e); line-height:1; }
.mw-st .ml { font-family:var(--font-mono); font-size:.46rem; color:var(--muted); letter-spacing:.1em; margin-top:3px; }
.mw-earn { font-family:var(--font-display); font-size:clamp(1.5rem,5vw,2rem); color:var(--neon-c); letter-spacing:.06em; }
.mw-newbest {
  font-family:var(--font-mono); font-size:.62rem; font-weight:700;
  color:var(--neon-f); padding:4px 12px; border-radius:6px;
  border:1px solid color-mix(in srgb,var(--neon-f) 35%,transparent);
  background:color-mix(in srgb,var(--neon-f) 10%,transparent);
  animation: bestPulse .9s ease infinite alternate;
}
@keyframes bestPulse {
  from { box-shadow: 0 0 0 transparent; }
  to   { box-shadow: 0 0 18px color-mix(in srgb,var(--neon-f) 50%,transparent); }
}

/* ── confetti ── */
.cfp {
  position: fixed; border-radius: 2px; pointer-events: none; z-index: 800;
  animation: cfDrop var(--d) ease-in var(--dl) forwards;
}
@keyframes cfDrop {
  0%  { transform: translateY(-8px) rotate(0deg);   opacity:1; }
  85% { opacity: 1; }
  100%{ transform: translateY(108vh) rotate(800deg); opacity:0; }
}
</style>
</head>
<body>
<!-- nav is built by JS -->
<nav class="nav" id="main-nav"></nav>

<div class="page" style="padding-top:10px; gap:0;">
<div class="mem-wrap">

  <!-- HUD -->
  <div class="mem-hud">
    <div class="mh-box" id="hud-pairs"> <div class="mh-v" id="h-pairs">0/0</div><div class="mh-l">PAIRS</div> </div>
    <div class="mh-box" id="hud-moves"> <div class="mh-v" id="h-moves">0</div>  <div class="mh-l">MOVES</div> </div>
    <div class="mh-box" id="hud-time">  <div class="mh-v" id="h-time">0s</div>  <div class="mh-l">TIME</div>  </div>
    <div class="mh-box" id="hud-combo"> <div class="mh-v" id="h-combo">×1</div> <div class="mh-l">COMBO</div> </div>
  </div>

  <!-- combo banner -->
  <div class="mem-combo" id="combo-txt"></div>

  <!-- difficulty pills -->
  <div class="mem-diffs">
    <button class="md-pill on" id="dp-easy"   onclick="pickDiff('easy')">  🟢 EASY   <span class="md-sub">4×3 · FREE</span></button>
    <button class="md-pill"    id="dp-medium" onclick="pickDiff('medium')">🟡 MEDIUM <span class="md-sub">4×4 · 🪙5</span></button>
    <button class="md-pill"    id="dp-hard"   onclick="pickDiff('hard')">  🔴 HARD   <span class="md-sub">5×4 · 🪙10</span></button>
  </div>

  <!-- personal best times -->
  <div class="mem-bests" id="best-strip"></div>

  <!-- board -->
  <div class="mem-board-shell">
    <div id="mem-board"></div>
  </div>

  <!-- power-ups -->
  <div class="mem-pups">
    <button class="pu" onclick="doPeek()">   👁 PEEK    <span class="pc">🪙5</span></button>
    <button class="pu" onclick="doShuffle()">🔀 SHUFFLE <span class="pc">🪙3</span></button>
  </div>

  <!-- action buttons -->
  <div class="btn-row">
    <button class="btn filled" style="--c:var(--neon-e)" onclick="startGame()">▶ NEW GAME</button>
    <a class="btn" href="index.html">HUB</a>
  </div>

</div>
</div>

<!-- Win overlay -->
<div class="mem-win hidden" id="win-ov">
  <div class="mw-title">YOU WIN! 🎉</div>
  <div class="mw-stats">
    <div class="mw-st"><div class="mv" id="w-moves">0</div>  <div class="ml">MOVES</div></div>
    <div class="mw-st"><div class="mv" id="w-time">0s</div>  <div class="ml">TIME</div></div>
    <div class="mw-st"><div class="mv" id="w-combo">×1</div> <div class="ml">BEST COMBO</div></div>
  </div>
  <div class="mw-earn" id="w-earned">+0 🪙</div>
  <div class="mw-newbest hidden" id="w-newbest">⭐ NEW BEST TIME!</div>
  <div class="btn-row">
    <button class="btn filled" style="--c:var(--neon-e)" onclick="startGame()">PLAY AGAIN</button>
    <button class="btn" style="--c:var(--neon-a)"
            onclick="document.getElementById('win-ov').classList.add('hidden')">VIEW BOARD</button>
    <a class="btn" href="index.html">HUB</a>
  </div>
</div>

<script>
/* ══════════════════════ NAV SETUP ══════════════════════════════ */
(function(){
  var nav = document.getElementById('main-nav');
  nav.innerHTML =
    '<a class="nav-back" href="index.html">← Hub</a>' +
    '<div class="nav-sep"></div>' +
    '<div class="nav-title">' +
      '<span class="dot" style="background:var(--neon-e);box-shadow:0 0 8px var(--neon-e)"></span>' +
      'MEMORY MATCH' +
    '</div>' +
    '<div class="score-pill"><span class="val" id="nav-moves">0</span><span class="lbl">MOVES</span></div>' +
    '<a class="coin-nav" href="wallet.html"><span>🪙</span><span class="az-bal">0</span></a>' +
    '<button class="theme-btn" id="tb">🌙</button>';

  var tb = document.getElementById('tb');
  function syncTheme(){ tb.textContent = CoinEngine.getTheme()==='dark' ? '☀️' : '🌙'; }
  tb.addEventListener('click', function(){ CoinEngine.toggleTheme(); syncTheme(); });
  syncTheme();

  document.addEventListener('az:balance', function(e){
    document.querySelectorAll('.az-bal').forEach(function(el){ el.textContent = e.detail; });
  });
})();

/* ══════════════════════ CONFIG ════════════════════════════════ */
var CFG = {
  easy:   { cols:4, rows:3, cost:0,  pairs:6  },
  medium: { cols:4, rows:4, cost:5,  pairs:8  },
  hard:   { cols:5, rows:4, cost:10, pairs:10 }
};
var POOL = {
  easy:   ['🦊','🐸','🦋','🐙','🌈','🎸'],
  medium: ['🦊','🐸','🦋','🐙','🌈','🎸','🍕','🚀'],
  hard:   ['🦊','🐸','🦋','🐙','🌈','🎸','🍕','🚀','🐲','🦄']
};
var BEST_KEY = 'az_mem3_best_';

/* ══════════════════════ STATE ════════════════════════════════ */
var diff      = 'easy';
var cardA     = null;   /* first flipped card this turn */
var locked    = false;  /* IMPORTANT: stays true until unmatched cards fully flip back */
var matched   = 0;
var moves     = 0;
var streak    = 0;
var bestStreak= 0;
var t0        = 0;
var tmr       = null;
var active    = false;

/* ══════════════════════ CARD SIZING ═══════════════════════════ */
function cardSize(cols, rows) {
  var gap  = window.innerWidth >= 640 ? 11 : 8;
  var pad  = window.innerWidth >= 640 ? 32 : 24;
  var overhead = 64 + 56 + 10 + /* nav + bottom-nav + margin */
                 240;            /* hud + controls below board */
  var maxW = window.innerWidth  - 24;
  var maxH = window.innerHeight - overhead;
  var byW  = Math.floor((maxW - gap*(cols-1) - pad*2) / cols);
  var byH  = Math.floor((maxH - gap*(rows-1) - pad*2) / rows);
  return Math.max(54, Math.min(108, Math.min(byW, byH)));
}

/* ══════════════════════ DIFFICULTY ════════════════════════════ */
function pickDiff(d) {
  diff = d;
  ['easy','medium','hard'].forEach(function(x){
    document.getElementById('dp-'+x).className = 'md-pill' + (d===x?' on':'');
  });
  renderBests();
}

/* ══════════════════════ PERSONAL BESTS ════════════════════════ */
function getBest(d) {
  try { var v = localStorage.getItem(BEST_KEY+d); return v!==null ? parseInt(v) : null; }
  catch(_){ return null; }
}
function saveBest(d, secs) {
  var prev = getBest(d);
  if (prev===null || secs < prev) {
    try { localStorage.setItem(BEST_KEY+d, secs); } catch(_){}
    return true;
  }
  return false;
}
function renderBests() {
  var icons = {easy:'🟢', medium:'🟡', hard:'🔴'};
  var html  = '';
  ['easy','medium','hard'].forEach(function(d){
    var b = getBest(d);
    if (b!==null) html += '<div class="mb-chip">'+icons[d]+' <b>'+b+'s</b></div>';
  });
  document.getElementById('best-strip').innerHTML = html;
}

/* ══════════════════════ CARD SKIN ═════════════════════════════ */
function getCardSkinStyle() {
  try {
    var id = localStorage.getItem('az_shop_eq_cards') || 'default';
    var BACKS = {
      'default':    { bg:'',        accent:'var(--neon-e)', symbol:'?',  extra:'' },
      'card_stars': { bg:'#0a0a1f', accent:'#ffe135',       symbol:'★',  extra:'' },
      'card_waves': { bg:'#001a2e', accent:'#00cfff',       symbol:'〰', extra:'' },
      'card_flame': { bg:'#1a0500', accent:'#ff4500',       symbol:'🔥', extra:'' },
      'card_geo':   { bg:'#0d0d0d', accent:'#00e5ff',       symbol:'◆',  extra:'' },
      'card_holo':  { bg:'#0a001a', accent:'#ff2d78',       symbol:'✦',  extra:'background-image:linear-gradient(135deg,rgba(255,0,128,.12),rgba(0,229,255,.12),rgba(191,90,242,.12))' },
    };
    return BACKS[id] || BACKS['default'];
  } catch(_) { return { bg:'', accent:'var(--neon-e)', symbol:'?', extra:'' }; }
}
function startGame() {
  var cfg = CFG[diff];

  /* charge entry cost */
  if (cfg.cost > 0 && !CoinEngine.spend(cfg.cost)) {
    CoinEngine.toast('Need 🪙'+cfg.cost+' to start '+diff+'!','warn');
    return;
  }
  if (cfg.cost > 0) CoinEngine.addHistory('🃏','Memory Match — '+diff, -cfg.cost);

  /* reset state */
  cardA=null; locked=false; matched=0; moves=0; streak=0; bestStreak=0; active=true;
  document.getElementById('win-ov').classList.add('hidden');
  setCombo('');
  clearInterval(tmr);
  t0 = Date.now();
  tmr = setInterval(function(){
    if (active) document.getElementById('h-time').textContent = Math.floor((Date.now()-t0)/1000)+'s';
  }, 400);

  SoundEngine.play('start');
  if (diff !== 'easy') SoundEngine.playBGM('memory');

  buildBoard();
  refreshHud();
}

/* ══════════════════════ BUILD BOARD ═══════════════════════════ */
function buildBoard() {
  var cfg  = CFG[diff];
  var cs   = cardSize(cfg.cols, cfg.rows);
  var gap  = window.innerWidth >= 640 ? 11 : 8;
  var efs  = Math.round(cs * 0.46) + 'px';
  var bqfs = Math.round(cs * 0.28) + 'px';

  var emojis = POOL[diff].slice(0, cfg.pairs);
  var deck = emojis.concat(emojis).sort(function(){ return Math.random()-.5; });

  var board = document.getElementById('mem-board');
  board.style.gridTemplateColumns = 'repeat('+cfg.cols+','+cs+'px)';
  board.style.gap                 = gap+'px';
  board.innerHTML = '';

  deck.forEach(function(em) {
    var card = document.createElement('div');
    card.className  = 'mc';
    card.dataset.em = em;
    card.style.width = card.style.height = cs+'px';
    var _skin = getCardSkinStyle();
    var _bs = _skin.bg ? 'background:'+_skin.bg+';' : '';
    if (_skin.extra) _bs += _skin.extra+';';
    card.innerHTML =
      '<div class="mc-inner">' +
        '<div class="mc-back" style="'+_bs+'">'  +
          '<span class="mc-back-q" style="font-size:'+bqfs+';color:'+_skin.accent+'">'+_skin.symbol+'</span>' +
        '</div>' +
        '<div class="mc-front">' +
          '<span class="mc-em" style="font-size:'+efs+'">'+em+'</span>' +
        '</div>' +
      '</div>';
    card.addEventListener('click', function(){ onCardClick(card); });
    board.appendChild(card);
  });
}

/* ══════════════════════ CARD CLICK ════════════════════════════ */
function onCardClick(card) {
  /* Guard: game not running, board locked, card already done or face-up */
  if (!active)                               return;
  if (locked)                                return;
  if (card.classList.contains('mc-matched')) return;
  if (card.classList.contains('mc-up'))      return;
  if (card.classList.contains('mc-peek'))    return;

  SoundEngine.play('flip');
  card.classList.add('mc-up');

  if (cardA === null) {
    /* First of the pair — store and wait */
    cardA = card;
    return;
  }

  /* Second of the pair — compare */
  var a = cardA;   /* first card (already face-up) */
  var b = card;    /* just flipped                 */
  cardA = null;    /* clear before any async work  */
  moves++;
  locked = true;   /* lock until we finish animating */
  refreshHud();

  if (a.dataset.em === b.dataset.em) {
    /* ── MATCH ── */
    matched++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    SoundEngine.play('match');

    a.classList.remove('mc-up'); b.classList.remove('mc-up');
    a.classList.add('mc-matched'); b.classList.add('mc-matched');

    flashHud('hud-combo');
    if (streak >= 2) {
      var msgs = {2:'✨ NICE!',3:'🔥 ON FIRE!',4:'⚡ COMBO ×4!',5:'💥 PENTA!',6:'🌟 UNSTOPPABLE!'};
      setCombo(msgs[Math.min(streak,6)] || '🚀 GODLIKE!');
    }
    refreshHud();
    locked = false;   /* unlock immediately after a match */

    if (matched === CFG[diff].pairs) setTimeout(winGame, 320);

  } else {
    /* ── NO MATCH ── */
    streak = 0;
    refreshHud();
    SoundEngine.play('wrong');
    a.classList.add('mc-wrong');
    b.classList.add('mc-wrong');

    /* Wait for shake (.42s) + flip-back transition (.35s) + buffer */
    setTimeout(function() {
      a.classList.remove('mc-up', 'mc-wrong');
      b.classList.remove('mc-up', 'mc-wrong');
      locked = false;   /* unlock ONLY after cards are face-down again */
    }, 620);
  }
}

/* ══════════════════════ HUD ═══════════════════════════════════ */
function refreshHud() {
  var cfg = CFG[diff];
  document.getElementById('h-pairs').textContent = matched+'/'+cfg.pairs;
  document.getElementById('h-moves').textContent = moves;
  document.getElementById('h-combo').textContent = '×'+Math.max(1, streak);
  var nm = document.getElementById('nav-moves');
  if (nm) nm.textContent = moves;
}

function flashHud(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(function(){ el.classList.remove('flash'); }, 600);
}

function setCombo(msg) {
  var el = document.getElementById('combo-txt');
  el.textContent = msg;
  el.classList.remove('show');
  if (msg) { void el.offsetWidth; el.classList.add('show'); }
}

/* ══════════════════════ WIN ════════════════════════════════════ */
function winGame() {
  clearInterval(tmr);
  active = false;
  SoundEngine.stopBGM();
  SoundEngine.play('success');

  var secs   = Math.floor((Date.now()-t0)/1000);
  var base   = {easy:14, medium:24, hard:40}[diff];
  var speedB = Math.max(0, Math.floor(50 - secs/2));
  var comboB = bestStreak >= 4 ? bestStreak*4 : 0;
  var earned = base + speedB + comboB;

  CoinEngine.add(earned, 'Memory Match — '+diff, '🃏');
  CoinEngine.recordGame('memory', earned, true, {diff:diff, moves:moves, time:secs});

  var isNew = saveBest(diff, secs);
  renderBests();

  document.getElementById('w-moves').textContent  = moves;
  document.getElementById('w-time').textContent   = secs+'s';
  document.getElementById('w-combo').textContent  = '×'+bestStreak;
  document.getElementById('w-earned').textContent = '+'+earned+' 🪙';
  var nb = document.getElementById('w-newbest');
  if (isNew) nb.classList.remove('hidden'); else nb.classList.add('hidden');

  document.getElementById('win-ov').classList.remove('hidden');
  confetti();
}

/* ══════════════════════ POWER-UPS ═════════════════════════════ */
function doPeek() {
  if (!active) { CoinEngine.toast('Start a game first!','warn'); return; }
  if (locked)  { CoinEngine.toast('Wait for the board to settle!','warn'); return; }
  if (!CoinEngine.spend(5)) { CoinEngine.toast('Need 🪙5 for Peek!','warn'); return; }

  SoundEngine.play('unlock');
  CoinEngine.toast('👁 Peeking for 2s…','info');

  /* Flip all unmatched face-up temporarily */
  var cards = Array.from(document.querySelectorAll('.mc:not(.mc-matched):not(.mc-up)'));
  locked = true;
  cards.forEach(function(c){ c.classList.add('mc-peek'); });

  setTimeout(function(){
    cards.forEach(function(c){ c.classList.remove('mc-peek'); });
    locked = false;
  }, 2000);
}

function doShuffle() {
  if (!active) { CoinEngine.toast('Start a game first!','warn'); return; }
  if (locked)  { CoinEngine.toast('Wait for the board to settle!','warn'); return; }
  var cfg = CFG[diff];
  if (matched >= cfg.pairs-1) { CoinEngine.toast('Almost done — no need!','info'); return; }
  if (!CoinEngine.spend(3)) { CoinEngine.toast('Need 🪙3 to Shuffle!','warn'); return; }

  SoundEngine.play('toggle');
  CoinEngine.toast('🔀 Unmatched cards shuffled!','info');

  /* Re-assign emojis among unmatched face-down cards */
  var faceDown = Array.from(document.querySelectorAll('.mc:not(.mc-matched):not(.mc-up)'));
  var ems = faceDown.map(function(c){ return c.dataset.em; })
                    .sort(function(){ return Math.random()-.5; });
  faceDown.forEach(function(c, i){
    c.dataset.em = ems[i];
    var emEl = c.querySelector('.mc-em');
    if (emEl) emEl.textContent = ems[i];
  });
  cardA = null;
}

/* ══════════════════════ CONFETTI ══════════════════════════════ */
function confetti() {
  var cols = ['#00e5ff','#ff2d78','#ffe135','#00e676','#bf5af2','#ff6b35'];
  for (var i = 0; i < 72; i++) {
    var el = document.createElement('div');
    el.className = 'cfp';
    el.style.left        = Math.random()*100 + 'vw';
    el.style.top         = '-10px';
    el.style.width       = (5 + Math.random()*8) + 'px';
    el.style.height      = (8 + Math.random()*10) + 'px';
    el.style.background  = cols[i % cols.length];
    el.style.setProperty('--d',  (1.1 + Math.random()*1.7) + 's');
    el.style.setProperty('--dl', (Math.random()*0.8) + 's');
    el.style.transform   = 'rotate('+(Math.random()*360)+'deg)';
    document.body.appendChild(el);
    setTimeout(function(){ el.remove(); }, 3600);
  }
}

/* ══════════════════════ RESPONSIVE RESIZE ═════════════════════ */
var _rszT;
window.addEventListener('resize', function(){
  clearTimeout(_rszT);
  _rszT = setTimeout(function(){
    if (!active) return;
    var cfg = CFG[diff];
    var cs  = cardSize(cfg.cols, cfg.rows);
    var gap = window.innerWidth >= 640 ? 11 : 8;
    var efs = Math.round(cs*0.46)+'px';
    var board = document.getElementById('mem-board');
    board.style.gridTemplateColumns = 'repeat('+cfg.cols+','+cs+'px)';
    board.style.gap = gap+'px';
    board.querySelectorAll('.mc').forEach(function(c){
      c.style.width = c.style.height = cs+'px';
      var e = c.querySelector('.mc-em'); if(e) e.style.fontSize = efs;
    });
  }, 200);
});

/* ══════════════════════ INIT ══════════════════════════════════ */
renderBests();
setTimeout(startGame, 80);
</script>
