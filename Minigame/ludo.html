<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ludo — Arcade Zone</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="coins.js"></script>
<script src="sound.js"></script>
<script src="game-ui.js"></script>
<style>
:root{--accent:var(--neon-c);}
.ld-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:980px;}
#ldcv{display:block;border-radius:12px;touch-action:none;cursor:pointer;}

.ld-dice{width:66px;height:66px;background:linear-gradient(135deg,#fff 60%,#e8e8e8);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;cursor:pointer;-webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 16px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.8);
  border:2px solid rgba(255,255,255,.5);transition:transform .1s;}
.ld-dice:active{transform:scale(.88);}
.ld-dice.rolling{animation:ldRoll .55s ease;}
@keyframes ldRoll{0%{transform:rotate(0)scale(1)}20%{transform:rotate(-22deg)scale(1.1)}50%{transform:rotate(20deg)scale(.9)}80%{transform:rotate(-10deg)scale(1.05)}100%{transform:rotate(0)scale(1)}}

.ld-panel{display:flex;flex-direction:column;gap:9px;}
.ld-stat{background:var(--card-bg);border:1px solid var(--line2);border-radius:10px;padding:9px 12px;text-align:center;}
.ld-stat .sv{font-family:var(--font-display);font-size:1.4rem;line-height:1;}
.ld-stat .sl{font-family:var(--font-mono);font-size:.48rem;color:var(--muted);letter-spacing:.1em;margin-top:2px;}
.ld-status{font-family:var(--font-mono);font-size:.7rem;color:var(--text2);text-align:center;min-height:2.6rem;line-height:1.65;font-weight:600;}
</style>
</head>
<body>
<nav class="nav" id="main-nav">
  <a class="nav-back" href="index.html">← Hub</a>
  <div class="nav-sep"></div>
  <div class="nav-title"><span class="dot" style="background:var(--neon-c);box-shadow:0 0 8px var(--neon-c)"></span>LUDO</div>
  <a class="coin-nav" href="wallet.html"><span>🪙</span><span class="az-bal">0</span></a>
  <button class="theme-btn" id="tb">🌙</button>
</nav>
<div class="page" style="padding-top:10px;align-items:center;">
<div class="ld-wrap game-scale-root">

  <div class="game-desktop-layout" style="align-items:flex-start;">
    <div class="game-canvas-col">
      <canvas id="ldcv"></canvas>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(-1)">−</button>
        <span class="zoom-label" id="zoom-lbl">100%</span>
        <button class="zoom-btn" onclick="changeZoom(1)">+</button>
      </div>
    </div>

    <div class="ld-panel game-side-panel">
      <div style="display:flex;justify-content:center;">
        <div class="ld-dice" id="ld-dice" onclick="rollDice()">🎲</div>
      </div>
      <div class="ld-stat"><div class="sv" id="ld-rolled" style="color:var(--neon-e)">–</div><div class="sl">ROLLED</div></div>
      <div class="ld-stat"><div class="sv" id="ld-p0h" style="color:#ff4488">0/4</div><div class="sl">YOU AT HOME</div></div>
      <div class="ld-stat"><div class="sv" id="ld-p1h" style="color:#00ccff">0/4</div><div class="sl">CPU AT HOME</div></div>
      <button class="btn filled" style="--c:var(--neon-c);width:100%" id="roll-btn" onclick="rollDice()">🎲 ROLL (🪙 8)</button>
      <div class="ld-status" id="ld-status">Tap ROLL to start!</div>
      <button class="btn filled" style="--c:var(--neon-a);width:100%" onclick="newGame()">▶ NEW GAME</button>
      <button class="btn" style="--c:var(--neon-a);font-size:.72rem;width:100%" onclick="doShare()">📤 Share</button>
      <div style="font-family:var(--font-mono);font-size:.56rem;color:var(--muted);line-height:1.85;background:var(--card-bg);border:1px solid var(--line2);border-radius:8px;padding:8px 10px;">
        🎯 Roll 6 to enter board<br>
        🏠 Move all 4 tokens home<br>
        💥 Land on opponent = send home<br>
        ⭐ Safe squares = no knockout<br>
        🏆 First to home all 4 wins = +30 🪙
      </div>
    </div>
  </div>

</div>
</div>
<script>
var _tb=document.getElementById('tb');
function _sT(){_tb.textContent=CoinEngine.getTheme()==='dark'?'☀️':'🌙';}
_tb.addEventListener('click',function(){CoinEngine.toggleTheme();_sT();draw();}); _sT();

/* ── Canvas ── */
var cv=document.getElementById('ldcv');
var ctx=cv.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1,2);
var BS, CS, zoomIdx=2, zoomSteps=[0.55,0.75,1,1.25,1.5,1.85];

function changeZoom(d){
  zoomIdx=Math.max(0,Math.min(zoomSteps.length-1,zoomIdx+d));
  document.getElementById('zoom-lbl').textContent=Math.round(zoomSteps[zoomIdx]*100)+'%';
  initCanvas(); draw();
}
function initCanvas(){
  var avW=Math.min(window.innerWidth-40, window.innerWidth>820?540:window.innerWidth-24);
  var raw=Math.min(avW, window.innerHeight-280, 540)*zoomSteps[zoomIdx];
  BS=Math.floor(raw/15)*15; CS=BS/15;
  cv.style.width=BS+'px'; cv.style.height=BS+'px';
  cv.width=BS*DPR; cv.height=BS*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
initCanvas();
window.addEventListener('resize',function(){initCanvas();draw();});

var DICE_FACES=['⚀','⚁','⚂','⚃','⚄','⚅'];

/* ── Ludo 52-step outer track (0-indexed cells on 15×15 grid) ── */
/* Player 0 (Red) enters at track[0], Player 1 (Blue) enters at track[26] */
var TRACK=buildTrack();
function buildTrack(){
  var t=[];
  /* Bottom horizontal going right: row 12, col 1→5 (5) */
  for(var c=1;c<=5;c++) t.push({r:12,c:c});           // 0-4
  /* Up col 6: rows 11→9 (3) */
  for(var r=11;r>=9;r--) t.push({r:r,c:6});            // 5-7
  /* Right row 8: col 6→8 (3) */
  for(var c=6;c<=8;c++) t.push({r:8,c:c});             // 8-10
  /* Up col 8: rows 7→1 (7) */
  for(var r=7;r>=1;r--) t.push({r:r,c:8});             // 11-17
  /* Right row 2: col 9→13 (5) */
  for(var c=9;c<=13;c++) t.push({r:2,c:c});            // 18-22  (was row 1)
  /* Down col 13: rows 3→5 (3) */
  for(var r=3;r<=5;r++) t.push({r:r,c:13});            // 23-25
  /* Left row 6: col 13→9 reversed (keep going around) */
  /* Right row 6: col 9→13 (5) */
  /* Actually let's continue clockwise: */
  /* After top, we go down right side */
  /* Down col 8 approach from right → right-side: row 6, col 9→13 */
  for(var c=9;c<=13;c++) t.push({r:6,c:c});            // 26-30
  /* Down col 13: rows 7→9 (3) */
  for(var r=7;r<=9;r++) t.push({r:r,c:13});            // 31-33
  /* Right row 8 extended: col 14... */
  /* Left row 12: col 13→9 (5) */
  for(var r=9;r<=11;r++) t.push({r:r,c:13});           // skip — already have these
  /* Let me just do a simple 52-step ring cleanly */
  return buildRing();
}
function buildRing(){
  /* Clean 52-cell ring for 15×15 Ludo board */
  var t=[];
  /* Red entry side (bottom-left), going clockwise: */
  /* Up left col: col 1, rows 12→2 = 11 */
  for(var r=12;r>=2;r--) t.push({r:r,c:1});      // 0-10
  /* Top row left→right: row 1, cols 2→12 = 11 */
  for(var c=2;c<=12;c++) t.push({r:1,c:c});       // 11-21
  /* Down right col: col 13, rows 2→12 = 11 */
  for(var r=2;r<=12;r++) t.push({r:r,c:13});      // 22-32
  /* Bottom row right→left: row 13, cols 12→2 = 11 */
  for(var c=12;c>=2;c--) t.push({r:13,c:c});      // 33-43
  /* Left bottom going up: col 1, row 13 then up — already covered */
  /* We have 44 — need 8 more through center crossings */
  /* Actually 11+11+11+11=44 — standard Ludo uses 52, so we extend through center */
  /* Add inner path cells through the center cross */
  /* Bottom-left entry going right across center: row 8, cols 2→6 = 5 */
  /* etc — for simplicity, use 44 track squares and 4-step home columns */
  return t; /* 44 cells */
}

/* Use 44-cell track */
var TRK=buildRing44();
function buildRing44(){
  var t=[];
  for(var r=12;r>=2;r--) t.push({r:r,c:1});      // 0-10: left col up
  for(var c=2;c<=12;c++) t.push({r:1,c:c});       // 11-21: top row right
  for(var r=2;r<=12;r++) t.push({r:r,c:13});      // 22-32: right col down
  for(var c=12;c>=2;c--) t.push({r:13,c:c});      // 33-43: bottom row left
  return t; /* 44 total */
}
var TRKLEN=TRK.length; /* 44 */

/* Players enter at these track positions */
var P_ENTER=[0,22]; /* Red enters at 0, Blue enters at 22 (opposite side) */
var P_HOME_ENTER=[33,11]; /* Red home entry after pos 33, Blue after 11 */
/* Home columns: 4 steps toward center */
var HOME_COL=[
  /* Red home: row 8 going right from col 2→6 (toward center) */
  [{r:8,c:2},{r:8,c:3},{r:8,c:4},{r:8,c:5},{r:8,c:6}],
  /* Blue home: row 6 going left from col 12→8 */
  [{r:6,c:12},{r:6,c:11},{r:6,c:10},{r:6,c:9},{r:6,c:8}],
];
/* Yard positions for 4 tokens of each player */
var YARDS=[
  [{r:2.5,c:2.5},{r:2.5,c:4},{r:4,c:2.5},{r:4,c:4}],     /* Red yard top-left */
  [{r:10.5,c:10.5},{r:10.5,c:12},{r:12,c:10.5},{r:12,c:12}] /* Blue yard bottom-right */
];
/* Safe squares (track indices) */
var SAFE=[0,10,11,21,22,32,33,43];

/* Token: pos = -1(yard) | 0-43(track) | 100-104(home col) | 200(done) */
var tokens=[[],[]], turn=0, rolling=false, gameOver=false, started=false, pendingRoll=0;
var pendingMoves=[], lastRoll=0;

function newGame(){
  if(!CoinEngine.spend(8)){CoinEngine.toast('Not enough coins!','warn');return;}
  tokens=[[{pos:-1},{pos:-1},{pos:-1},{pos:-1}],[{pos:-1},{pos:-1},{pos:-1},{pos:-1}]];
  turn=0; rolling=false; gameOver=false; started=true; pendingMoves=[];
  document.getElementById('roll-btn').disabled=false;
  setStatus('🎲 Your turn — Roll the dice!');
  updateHomeUI(); draw();
  SoundEngine.play('start');
}

function setStatus(s){document.getElementById('ld-status').textContent=s;}
function updateHomeUI(){
  document.getElementById('ld-p0h').textContent=tokens[0].filter(function(t){return t.pos===200;}).length+'/4';
  document.getElementById('ld-p1h').textContent=tokens[1].filter(function(t){return t.pos===200;}).length+'/4';
}

/* ── Roll ── */
function rollDice(){
  if(!started){newGame();return;}
  if(rolling||gameOver||turn!==0) return;
  var dice=document.getElementById('ld-dice');
  var btn=document.getElementById('roll-btn');
  rolling=true; btn.disabled=true;
  dice.classList.add('rolling');
  var i=0;
  var anim=setInterval(function(){
    dice.textContent=DICE_FACES[Math.floor(Math.random()*6)];
    if(++i>=10){
      clearInterval(anim);
      dice.classList.remove('rolling');
      lastRoll=Math.floor(Math.random()*6)+1;
      dice.textContent=DICE_FACES[lastRoll-1];
      document.getElementById('ld-rolled').textContent=lastRoll;
      SoundEngine.play('slide');
      processRoll(0,lastRoll);
    }
  },55);
}

function processRoll(player,roll){
  var movable=getMovable(player,roll);
  if(movable.length===0){
    setStatus((player===0?'No valid moves. ':'CPU: No moves. ')+'Passed.');
    SoundEngine.play('error');
    rolling=false;
    if(player===0){
      document.getElementById('roll-btn').disabled=false;
      /* extra roll on 6 not applicable if no moves */
      turn=1; setTimeout(cpuTurn,700);
    } else {
      turn=0; document.getElementById('roll-btn').disabled=false;
      setStatus('🎲 Your turn — Roll!');
    }
    return;
  }
  if(player===0){
    if(movable.length===1){
      doMove(0,movable[0],roll,function(){
        if(!gameOver) afterMove(0,roll);
      });
    } else {
      /* Highlight movable tokens, wait for tap */
      pendingMoves=movable; pendingRoll=roll;
      setStatus('Tap one of your tokens ('+movable.length+' options)');
      draw(movable);
    }
  } else {
    /* CPU: prefer tokens in play, else enter, else random */
    var choice=chooseCPU(movable,roll);
    setTimeout(function(){
      doMove(1,choice,roll,function(){
        if(!gameOver) afterMove(1,roll);
      });
    },500);
  }
}

function chooseCPU(movable,roll){
  /* Prefer tokens close to home, then tokens in play, then yard */
  var scored=movable.map(function(ti){
    var t=tokens[1][ti];
    if(t.pos===200) return {ti:ti,s:-1};
    if(t.pos>=100) return {ti:ti,s:200+t.pos};
    if(t.pos>=0)   return {ti:ti,s:t.pos};
    return {ti:ti,s:0};
  }).sort(function(a,b){return b.s-a.s;});
  return scored[0].ti;
}

function afterMove(player,roll){
  if(roll===6&&player===0){
    rolling=false; document.getElementById('roll-btn').disabled=false;
    setStatus('🎲 You rolled 6! Roll again.');
  } else if(roll===6&&player===1){
    setTimeout(cpuTurn,600);
  } else if(player===0){
    turn=1; setTimeout(cpuTurn,600);
  } else {
    turn=0; rolling=false;
    document.getElementById('roll-btn').disabled=false;
    setStatus('🎲 Your turn — Roll!');
  }
}

function getMovable(player,roll){
  var movable=[];
  tokens[player].forEach(function(tok,i){
    if(tok.pos===200) return;
    if(tok.pos===-1){if(roll===6) movable.push(i);return;}
    var np=nextPos(player,tok.pos,roll);
    if(np!==null) movable.push(i);
  });
  return movable;
}

function nextPos(player,pos,roll){
  if(pos===-1) return roll===6?-2:null; /* -2 = enter */
  if(pos<100){
    /* Check approach to home */
    var homeEntry=P_HOME_ENTER[player];
    var cur=pos;
    for(var s=0;s<roll;s++){
      if(cur===homeEntry){
        /* Enter home col */
        var homeStep=roll-s-1;
        if(homeStep>=HOME_COL[player].length) return null;
        return 100+homeStep;
      }
      cur=(cur+1)%TRKLEN;
    }
    return cur;
  }
  /* In home col */
  var hp=(pos-100)+roll;
  if(hp>=HOME_COL[player].length) return null;
  if(hp===HOME_COL[player].length-1) return 200; /* last home step = done */
  return 100+hp;
}

function doMove(player,tokIdx,roll,callback){
  var tok=tokens[player][tokIdx];
  var np=nextPos(player,tok.pos,roll);
  if(np===-2){
    tok.pos=P_ENTER[player];
    SoundEngine.play('coin')||SoundEngine.play('pop');
    setStatus((player===0?'🔴 Entered board!':'🔵 CPU entered board!'));
  } else if(np===200){
    tok.pos=200;
    SoundEngine.play('achievement')||SoundEngine.play('success');
    setStatus((player===0?'🔴 Token home!':'🔵 CPU token home!'));
  } else {
    tok.pos=np;
    SoundEngine.play('slide');
    /* Check knockout — only on track (not home col) */
    if(np<100){
      var other=1-player;
      tokens[other].forEach(function(ot){
        if(ot.pos===np&&ot.pos>=0){
          var isSafe=SAFE.indexOf(np)>=0;
          if(!isSafe){
            ot.pos=-1; /* send home */
            SoundEngine.play('die');
            setStatus((player===0?'💥 You knocked out CPU!':'💥 CPU knocked you out!'));
          }
        }
      });
    }
  }
  updateHomeUI(); draw();
  /* Check win */
  var done=tokens[player].filter(function(t){return t.pos===200;}).length;
  if(done===4){
    gameOver=true;
    if(player===0){
      SoundEngine.play('success');
      setStatus('🎉 All tokens home! YOU WIN!');
      CoinEngine.add(30,'Ludo — win','🎯');
      CoinEngine.recordGame('ludo',30,true,{});
      CoinEngine.toast('+30 🪙 Ludo win!','success');
    } else {
      SoundEngine.play('gameover');
      setStatus('😔 CPU wins! Try again.');
      CoinEngine.recordGame('ludo',0,false,{});
    }
    document.getElementById('roll-btn').disabled=true;
  }
  if(callback) callback();
}

function cpuTurn(){
  turn=1; rolling=true;
  var roll=Math.floor(Math.random()*6)+1;
  document.getElementById('ld-dice').textContent=DICE_FACES[roll-1];
  document.getElementById('ld-rolled').textContent=roll;
  setStatus('🔵 CPU rolled '+roll+'…');
  processRoll(1,roll);
}

/* Handle tap to select token */
cv.addEventListener('click',function(e){
  if(!started||gameOver||turn!==0||pendingMoves.length===0) return;
  var rect=cv.getBoundingClientRect();
  var mx=(e.clientX-rect.left)/BS*15;
  var my=(e.clientY-rect.top)/BS*15;
  pendingMoves.forEach(function(ti){
    var p=getTokenDraw(0,ti,false);
    if(Math.abs(p.cx-mx)<1.2&&Math.abs(p.cy-my)<1.2){
      var capTi=ti;
      pendingMoves=[];
      doMove(0,capTi,pendingRoll,function(){
        if(!gameOver) afterMove(0,pendingRoll);
      });
    }
  });
});

function getTokenDraw(player,ti,offset){
  var tok=tokens[player][ti];
  if(tok.pos===-1){
    var y=YARDS[player][ti];
    return {cx:y.c,cy:y.r};
  }
  if(tok.pos===200) return {cx:7.5,cy:7.5};
  if(tok.pos>=100) return {cx:HOME_COL[player][tok.pos-100].c,cy:HOME_COL[player][tok.pos-100].r};
  return {cx:TRK[tok.pos].c,cy:TRK[tok.pos].r};
}

/* ── Drawing ── */
var PLAYER_COLORS=[
  {main:'#ff2d78',light:'#ff80aa',dark:'#aa0040',glow:'rgba(255,45,120,.85)'},
  {main:'#00ccff',light:'#80e8ff',dark:'#0060aa',glow:'rgba(0,200,255,.85)'},
];

function draw(highlight){
  var isDark=CoinEngine.getTheme()==='dark';
  ctx.clearRect(0,0,BS,BS);

  /* Board BG */
  ctx.fillStyle=isDark?'#07070f':'#f0f0ff';
  ctx.fillRect(0,0,BS,BS);

  var c=CS;

  /* Yard zones */
  drawYardZone(0,0,0,6,6,isDark);       /* Red top-left */
  drawYardZone(1,9,9,6,6,isDark);       /* Blue bottom-right */

  /* Center home */
  var cg=ctx.createLinearGradient(6*c,6*c,(6+3)*c,(6+3)*c);
  cg.addColorStop(0,isDark?'rgba(255,220,80,.22)':'rgba(255,180,0,.18)');
  cg.addColorStop(1,isDark?'rgba(255,120,40,.12)':'rgba(255,100,0,.1)');
  ctx.fillStyle=cg;
  ctx.fillRect(6*c,6*c,3*c,3*c);

  /* Track cells */
  TRK.forEach(function(cell,idx){
    var isSafe=SAFE.indexOf(idx)>=0;
    ctx.fillStyle=isSafe
      ?(isDark?'rgba(255,220,0,.2)':'rgba(255,180,0,.25)')
      :(isDark?'rgba(255,255,255,.04)':'rgba(255,255,255,.65)');
    ctx.fillRect(cell.c*c+1,cell.r*c+1,c-2,c-2);
    if(isSafe){
      ctx.font=(c*0.4)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⭐',cell.c*c+c/2,cell.r*c+c/2);
    }
    /* Entry marks */
    if(idx===P_ENTER[0]){ctx.fillStyle=PLAYER_COLORS[0].glow;ctx.fillRect(cell.c*c+1,cell.r*c+1,c-2,c-2);}
    if(idx===P_ENTER[1]){ctx.fillStyle=PLAYER_COLORS[1].glow;ctx.fillRect(cell.c*c+1,cell.r*c+1,c-2,c-2);}
  });

  /* Home columns */
  [0,1].forEach(function(pi){
    HOME_COL[pi].forEach(function(cell,step){
      var col=PLAYER_COLORS[pi];
      ctx.fillStyle=isDark
        ?'rgba('+hexToRgb(col.main)+','+(0.15+step*0.05)+')'
        :'rgba('+hexToRgb(col.main)+','+(0.12+step*0.04)+')';
      ctx.fillRect(cell.c*c+1,cell.r*c+1,c-2,c-2);
      if(step===HOME_COL[pi].length-1){
        ctx.font=(c*0.45)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('🏠',cell.c*c+c/2,cell.r*c+c/2);
      }
    });
  });

  /* Grid */
  ctx.strokeStyle=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.09)';
  ctx.lineWidth=.5;
  for(var i=0;i<=15;i++){ctx.beginPath();ctx.moveTo(i*c,0);ctx.lineTo(i*c,BS);ctx.stroke();}
  for(var j=0;j<=15;j++){ctx.beginPath();ctx.moveTo(0,j*c);ctx.lineTo(BS,j*c);ctx.stroke();}

  /* Center icon */
  ctx.font=(c*1.2)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🎯',7.5*c,7.5*c);

  /* Player tokens — draw all */
  [1,0].forEach(function(pi){ /* draw CPU first so player's go on top */
    tokens[pi].forEach(function(tok,ti){
      var p=getTokenDraw(pi,ti,false);
      var cx=p.cx*c, cy=p.cy*c;
      var col=PLAYER_COLORS[pi];
      var isHL=highlight&&pi===0&&highlight.indexOf(ti)>=0;
      var r=c*0.33;
      if(tok.pos===200) r=c*0.18;

      /* Pulse highlight */
      if(isHL) r*=1.18;

      /* Outer glow */
      ctx.shadowColor=col.glow; ctx.shadowBlur=isHL?22:14;
      /* Gradient fill */
      var gr=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.05,cx,cy,r);
      gr.addColorStop(0,col.light);
      gr.addColorStop(0.5,col.main);
      gr.addColorStop(1,col.dark);
      ctx.fillStyle=gr;
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;

      /* Shine */
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.beginPath();ctx.ellipse(cx-r*0.3,cy-r*0.3,r*0.26,r*0.16,-0.5,0,Math.PI*2);ctx.fill();

      /* Done checkmark */
      if(tok.pos===200){
        ctx.fillStyle='rgba(255,255,255,.95)';
        ctx.font='bold '+(r*1.6)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('✓',cx,cy);
      }
      /* Highlight ring */
      if(isHL){
        ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2;
        ctx.shadowColor='#fff';ctx.shadowBlur=10;
        ctx.beginPath();ctx.arc(cx,cy,r+2,0,Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;
      }
    });
  });
}

function drawYardZone(player,x,y,w,h,isDark){
  var col=PLAYER_COLORS[player];
  var gr=ctx.createLinearGradient(x*CS,y*CS,(x+w)*CS,(y+h)*CS);
  gr.addColorStop(0,isDark?'rgba('+hexToRgb(col.main)+',.18)':'rgba('+hexToRgb(col.main)+',.14)');
  gr.addColorStop(1,isDark?'rgba('+hexToRgb(col.dark)+',.1)':'rgba('+hexToRgb(col.main)+',.08)');
  ctx.fillStyle=gr;
  ctx.fillRect(x*CS,y*CS,w*CS,h*CS);
  /* Label */
  ctx.fillStyle=isDark?'rgba(255,255,255,.35)':'rgba(0,0,0,.3)';
  ctx.font='bold '+(CS*0.4)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(player===0?'YOU':'CPU',(x+w/2)*CS,(y+h/2)*CS);
}

function hexToRgb(hex){
  /* Convert #rrggbb to "r,g,b" */
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function doShare(){
  var d=tokens[0].filter(function(t){return t.pos===200;}).length;
  var txt='🎯 Ludo: '+d+'/4 tokens home on Arcade Zone! Play free: '+window.location.origin;
  if(navigator.share){navigator.share({title:'Arcade Zone',text:txt}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){CoinEngine.toast('Copied!','info');});}
}

initCanvas(); draw();
</script>
