/* Simplified Ludo: 48-step outer path + 6-step home column */
/* Player tokens: pos=-1 (yard), 0-47 (track), 48-53 (home col), 54=done */
/* Player 0 (Red) starts at track pos 0, safe squares at 0,8,16,24,32,40 */
/* Player 1 (Blue) starts at track pos 26 (opposite side) */

var TRACK = generateTrack();
function generateTrack(){
  /* 48 outer squares on a 15x15 grid */
  var t = [];
  /* Left col down (rows 2→12 col 1): 11 cells */
  for(var r=2;r<=12;r++) t.push({r:r,c:1});
  /* Bottom row right (cols 2→12 row 13): 11 cells */
  for(var c=2;c<=12;c++) t.push({r:13,c:c});
  /* Right col up (rows 12→2 col 13): 11 cells */
  for(var r=12;r>=2;r--) t.push({r:r,c:13});
  /* Top row left (cols 12→2 row 1): 11 cells */
  for(var c=12;c>=2;c--) t.push({r:1,c:c});
  /* = 44 cells. Add 4 corner cells */
  t = [];
  /* Simple 48-cell ring: */
  /* Top row cols 6→8: 3 */
  /* Right col rows 1→6: etc — just hardcode clean version */
  /* FINAL simplified 48-step path: */
  var path = [];
  var W=15;
  /* Go around the board 1 cell from edges (inner ring of 15x15) */
  /* Top row L→R: row 1, cols 1→13 = 13 */
  for(var c=1;c<=13;c++) path.push({r:1,c:c});
  /* Right col T→B: col 13, rows 2→13 = 12 */
  for(var r=2;r<=13;r++) path.push({r:r,c:13});
  /* Bottom row R→L: row 13, cols 12→1 = 12 */
  for(var c=12;c>=1;c--) path.push({r:13,c:c});
  /* Left col B→T: col 1, rows 12→2 = 11 */
  for(var r=12;r>=2;r--) path.push({r:r,c:1});
  /* = 13+12+12+11 = 48 ✓ */
  return path;
}
/* Home columns (going toward center) */
var HOME_COL = [
  /* Red (starts at TRACK[0]) home: left col going right */
  [{r:7,c:2},{r:7,c:3},{r:7,c:4},{r:7,c:5},{r:7,c:6},{r:7,c:7}],
  /* Blue (starts at TRACK[24]) home: right col going left */
  [{r:7,c:12},{r:7,c:11},{r:7,c:10},{r:7,c:9},{r:7,c:8},{r:7,c:7}],
];
var PLAYER_START = [0, 24]; /* track positions */
var PLAYER_ENTER = [0, 24]; /* where to enter when rolling 6 */
var PLAYER_HOME_ENTER = [42, 18]; /* track pos where home col starts */
var PLAYER_COLORS = ['#ff2d78','#0090ff'];
var PLAYER_LABELS = ['YOU 🔴','CPU 🔵'];
var DICE_EMOJI = ['⚀','⚁','⚂','⚃','⚄','⚅'];

/* Token: {pos: -1(yard)|0-47(track)|100-105(home col)|200(done)} */
var tokens = [[],[]], turn=0, gameOver=false, started=false;
var lastRoll=0, rolling=false, pendingMoves=[];

function newGame(){
  if(!CoinEngine.spend(8)){CoinEngine.toast('Not enough coins!','warn');return;}
  tokens = [
    [{pos:-1},{pos:-1},{pos:-1},{pos:-1}],
    [{pos:-1},{pos:-1},{pos:-1},{pos:-1}]
  ];
  turn=0; gameOver=false; started=true; rolling=false; pendingMoves=[];
  document.getElementById('l-roll-btn').disabled=false;
  setStatus('🎲 Your turn! Roll the dice.');
  draw();
  SoundEngine.play('start');
}

function setStatus(msg){document.getElementById('l-status').textContent=msg;}

function updateHomeUI(){
  var p0done=tokens[0].filter(function(t){return t.pos===200;}).length;
  var p1done=tokens[1].filter(function(t){return t.pos===200;}).length;
  document.getElementById('p-home').textContent=p0done+'/4';
  document.getElementById('c-home').textContent=p1done+'/4';
}

/* ── Roll ── */
function rollDice(){
  if(!started){newGame();return;}
  if(rolling||gameOver||turn!==0)return;
  var dice=document.getElementById('l-dice');
  var btn=document.getElementById('l-roll-btn');
  rolling=true; btn.disabled=true;
  dice.classList.add('rolling');
  var count=0;
  var anim=setInterval(function(){
    dice.textContent=DICE_EMOJI[Math.floor(Math.random()*6)];
    if(++count>=8){
      clearInterval(anim);
      lastRoll=Math.floor(Math.random()*6)+1;
      dice.textContent=DICE_EMOJI[lastRoll-1];
      dice.classList.remove('rolling');
      handleRoll(0,lastRoll,true);
    }
  },60);
}

function handleRoll(player,roll,isHuman){
  SoundEngine.play('slide');
  /* find movable tokens */
  var movable = getMovable(player,roll);
  if(movable.length===0){
    setStatus((player===0?'No moves! ':'CPU — no moves! ')+'Rolled '+roll);
    rolling=false;
    if(!isHuman) setTimeout(function(){turn=0;rolling=false;document.getElementById('l-roll-btn').disabled=false;setStatus('🎲 Your turn! Roll the dice.');},600);
    else if(roll!==6){turn=1;setTimeout(cpuTurn,500);}
    else{rolling=false;document.getElementById('l-roll-btn').disabled=false;}
    return;
  }
  if(isHuman){
    if(movable.length===1){
      /* auto-move if only one option */
      moveToken(player,movable[0],roll,function(){
        if(!gameOver){
          if(roll===6){rolling=false;document.getElementById('l-roll-btn').disabled=false;setStatus('🎲 Roll again! (You got 6)');}
          else{turn=1;setTimeout(cpuTurn,600);}
        }
      });
    } else {
      /* highlight movable tokens, wait for tap */
      pendingMoves=movable; pendingRoll=roll;
      setStatus('Tap a token to move (rolled '+roll+')');
      draw(movable);
    }
  } else {
    /* CPU: pick best move */
    var choice=movable[Math.floor(Math.random()*movable.length)];
    setTimeout(function(){
      moveToken(player,choice,roll,function(){
        if(!gameOver){
          if(roll===6){setTimeout(cpuTurn,600);}
          else{turn=0;rolling=false;document.getElementById('l-roll-btn').disabled=false;setStatus('🎲 Your turn! Roll the dice.');}
        }
      });
    },400);
  }
}

var pendingRoll=0;

function getMovable(player,roll){
  var movable=[];
  tokens[player].forEach(function(tok,i){
    if(tok.pos===200)return; /* already done */
    if(tok.pos===-1){if(roll===6)movable.push(i);return;}
    /* check if can move */
    var np=nextPos(player,tok.pos,roll);
    if(np!==null)movable.push(i);
  });
  return movable;
}

function nextPos(player,pos,roll){
  if(pos===-1){return roll===6?-2:null;} /* -2 signals "enter board" */
  /* on track: 0-47 */
  if(pos<100){
    var homeEnter=PLAYER_HOME_ENTER[player];
    /* check if will reach/pass home entry */
    var steps=roll;
    var cur=pos;
    for(var s=0;s<steps;s++){
      cur=(cur+1)%48;
      if(cur===homeEnter&&s<steps-1){
        /* entering home col */
        var homeStep=steps-s-1;
        if(homeStep>6)return null;
        return 100+homeStep;
      }
    }
    if(cur===homeEnter){return 100;} /* exactly at home entry */
    return cur;
  }
  /* in home col: 100-105 */
  var homePos=(pos-100)+roll;
  if(homePos>6)return null;
  if(homePos===6)return 200; /* done! */
  return 100+homePos;
}

function moveToken(player,tokIdx,roll,callback){
  var tok=tokens[player][tokIdx];
  var np=nextPos(player,tok.pos,roll);
  if(np===-2){
    /* enter board */
    tok.pos=PLAYER_ENTER[player];
    SoundEngine.play('coin');
  } else if(np===200){
    tok.pos=200;
    SoundEngine.play('achievement');
  } else {
    tok.pos=np;
    SoundEngine.play('slide');
  }
  updateHomeUI(); draw();
  /* check win */
  var done=tokens[player].filter(function(t){return t.pos===200;}).length;
  if(done===4){
    gameOver=true;
    if(player===0){
      SoundEngine.play('success');
      setStatus('🎉 You win! All tokens home!');
      CoinEngine.add(30,'Ludo — win','🎲');
      CoinEngine.recordGame('ludo',30,true,{});
      CoinEngine.toast('+30 🪙 Ludo win!','success');
    } else {
      SoundEngine.play('gameover');
      setStatus('😔 CPU wins! Better luck next time.');
      CoinEngine.recordGame('ludo',0,false,{});
    }
    if(callback)callback();
    return;
  }
  if(callback)callback();
}

  var rect=cv.getBoundingClientRect();
  var mx=(e.clientX-rect.left)/BS*15;
  var my=(e.clientY-rect.top)/BS*15;
  /* find which token was tapped */
  pendingMoves.forEach(function(tokIdx){
    var pos=getTokenCanvasPos(0,tokIdx);
    if(Math.abs(pos.cx-mx)<1.2&&Math.abs(pos.cy-my)<1.2){
      pendingMoves=[];
      moveToken(0,tokIdx,pendingRoll,function(){
        if(!gameOver){
          if(pendingRoll===6){rolling=false;document.getElementById('l-roll-btn').disabled=false;setStatus('🎲 Roll again! (You got 6)');}
          else{turn=1;setTimeout(cpuTurn,600);}
        }
      });
    }
  });
});

function cpuTurn(){
  turn=1;rolling=true;
  var roll=Math.floor(Math.random()*6)+1;
  document.getElementById('l-dice').textContent=DICE_EMOJI[roll-1];
  setStatus('🔵 CPU rolled '+roll+'...');
  handleRoll(1,roll,false);
}

/* ── Token screen position ── */
function getTokenCanvasPos(player,tokIdx){
  var tok=tokens[player][tokIdx];
  var yard=getYardPos(player,tokIdx);
  if(tok.pos===-1) return yard;
  if(tok.pos===200) return {cx:7.5,cy:7.5}; /* center */
  if(tok.pos>=100){
    var hp=HOME_COL[player][tok.pos-100];
    return {cx:hp.c,cy:hp.r};
  }
  var tp=TRACK[tok.pos];
  return {cx:tp.c,cy:tp.r};
}

function getYardPos(player,tokIdx){
  var yards=[[
    {cx:3,cy:3},{cx:4.5,cy:3},{cx:3,cy:4.5},{cx:4.5,cy:4.5} /* red yard top-left */
  ],[
    {cx:10.5,cy:10.5},{cx:12,cy:10.5},{cx:10.5,cy:12},{cx:12,cy:12} /* blue yard bottom-right */
  ]];
  return yards[player][tokIdx];
}

/* ── Drawing ── */
function draw(highlightTokens){
  var isDark=CoinEngine.getTheme()==='dark';
  var bg=isDark?'#07070f':'#f0f0f8';
  var boardBg=isDark?'#0d0d22':'#e0e0f4';
  ctx.clearRect(0,0,BS,BS);

  /* Board background */
  ctx.fillStyle=boardBg;
  ctx.beginPath();roundRectPath(ctx,0,0,BS,BS,8);ctx.fill();

  var c=CS; /* cell size */

  /* Colored zones */
  /* Red home (top-left) */
  ctx.fillStyle=isDark?'rgba(255,45,120,.22)':'rgba(255,45,120,.18)';
  ctx.fillRect(0,0,6*c,6*c);
  /* Blue home (bottom-right) */
  ctx.fillStyle=isDark?'rgba(0,144,255,.22)':'rgba(0,144,255,.18)';
  ctx.fillRect(9*c,9*c,6*c,6*c);
  /* Center safe zone */
  ctx.fillStyle=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
  ctx.fillRect(6*c,6*c,3*c,3*c);

  /* Draw track cells */
  TRACK.forEach(function(cell,idx){
    var x=cell.c*c, y=cell.r*c;
    /* safe star squares */
    var isSafe=(idx===0||idx===8||idx===16||idx===24||idx===32||idx===40);
    ctx.fillStyle=isSafe?(isDark?'rgba(255,221,0,.25)':'rgba(255,180,0,.3)'):(isDark?'rgba(255,255,255,.04)':'rgba(255,255,255,.6)');
    ctx.fillRect(x+1,y+1,c-2,c-2);
    if(isSafe){
      ctx.font=(c*0.45)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⭐',x+c/2,y+c/2);
    }
  });

  /* Home columns */
  HOME_COL.forEach(function(col,pi){
    col.forEach(function(cell,step){
      var x=cell.c*c, y=cell.r*c;
      ctx.fillStyle=PLAYER_COLORS[pi]+(isDark?'44':'33');
      ctx.fillRect(x+1,y+1,c-2,c-2);
    });
  });

  /* Grid */
  ctx.strokeStyle=isDark?'rgba(255,255,255,.05)':'rgba(0,0,0,.08)';
  ctx.lineWidth=.5;
  for(var i=0;i<=15;i++){ctx.beginPath();ctx.moveTo(i*c,0);ctx.lineTo(i*c,BS);ctx.stroke();}
  for(var j=0;j<=15;j++){ctx.beginPath();ctx.moveTo(0,j*c);ctx.lineTo(BS,j*c);ctx.stroke();}

  /* Yard labels */
  ctx.font='bold '+(c*.35)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=isDark?'rgba(255,45,120,.6)':'rgba(180,0,60,.5)';
  ctx.fillText('YOU',3*c,1.2*c);
  ctx.fillStyle=isDark?'rgba(0,144,255,.6)':'rgba(0,80,180,.5)';
  ctx.fillText('CPU',12*c,13.8*c);

  /* Tokens */
  [0,1].forEach(function(pi){
    tokens[pi].forEach(function(tok,ti){
      var pos=getTokenCanvasPos(pi,ti);
      var cx=pos.cx*c, cy=pos.cy*c;
      var isHL=highlightTokens&&pi===0&&highlightTokens.indexOf(ti)>=0;
      var r=c*0.32;
      /* glow for highlighted */
      if(isHL){ctx.shadowColor=PLAYER_COLORS[pi];ctx.shadowBlur=10;}
      ctx.fillStyle=PLAYER_COLORS[pi];
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      /* shine */
      ctx.fillStyle='rgba(255,255,255,0.35)';
      ctx.beginPath();ctx.arc(cx-r*0.3,cy-r*0.3,r*0.35,0,Math.PI*2);ctx.fill();
      /* done marker */
      if(tok.pos===200){
        ctx.fillStyle='rgba(255,255,255,.8)';
        ctx.font='bold '+(c*.3)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('✓',cx,cy);
      }
    });
  });

  /* Center diamond */
  ctx.fillStyle=isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.moveTo(7.5*c,6*c);ctx.lineTo(9*c,7.5*c);ctx.lineTo(7.5*c,9*c);ctx.lineTo(6*c,7.5*c);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=isDark?'rgba(255,255,255,.35)':'rgba(0,0,0,.25)';
  ctx.font=(c*.8)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🏠',7.5*c,7.5*c);
}

function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function doShare(){
  var done=tokens[0].filter(function(t){return t.pos===200;}).length;
  var txt='🎲 Playing Ludo on Arcade Zone! Got '+done+'/4 tokens home.\nPlay free: '+window.location.origin;
  if(navigator.share){navigator.share({title:'Arcade Zone',text:txt}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){CoinEngine.toast('Copied!','info');});}
}

initCanvas(); draw();
</script>
