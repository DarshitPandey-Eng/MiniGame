<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{--accent:var(--neon-a);}

/* ── Search + filter bar ── */
.htp-search{width:min(520px,92vw);position:relative;margin:0 auto 16px;}
.htp-search input{width:100%;box-sizing:border-box;padding:11px 14px 11px 40px;
  background:var(--card-bg);border:1.5px solid var(--line2);border-radius:10px;
  color:var(--text);font-family:var(--font-mono);font-size:.8rem;outline:none;
  transition:border-color .15s;}
.htp-search input:focus{border-color:var(--neon-a);}
.htp-search .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;}

/* ── Category tabs ── */
.htp-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.htp-tab{font-family:var(--font-mono);font-size:.62rem;font-weight:700;padding:7px 14px;
  border-radius:8px;border:1.5px solid var(--line2);background:var(--bg2);color:var(--muted);
  cursor:pointer;transition:all .12s;}
.htp-tab.on{border-color:var(--neon-a);color:var(--neon-a);
  background:color-mix(in srgb,var(--neon-a) 10%,transparent);}

/* ── Game card ── */
.htp-card{background:var(--card-bg);border:1px solid var(--line2);border-radius:14px;
  overflow:hidden;margin-bottom:12px;transition:border-color .15s;}
.htp-card:hover{border-color:var(--ca,var(--neon-a));}
.htp-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;
  transition:background .12s;user-select:none;}
.htp-header:hover{background:var(--card-hover);}
.htp-icon{font-size:2rem;flex-shrink:0;line-height:1;}
.htp-title-wrap{flex:1;}
.htp-name{font-family:var(--font-ui);font-size:1rem;font-weight:700;color:var(--text);}
.htp-tagline{font-family:var(--font-mono);font-size:.58rem;color:var(--muted);margin-top:3px;}
.htp-badges{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
.htp-badge{font-family:var(--font-mono);font-size:.44rem;font-weight:700;
  padding:3px 8px;border-radius:5px;}
.htp-badge.cost{background:color-mix(in srgb,var(--neon-c) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--neon-c) 22%,transparent);color:var(--neon-c);}
.htp-badge.free{background:color-mix(in srgb,var(--neon-d) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--neon-d) 22%,transparent);color:var(--neon-d);}
.htp-badge.diff{background:color-mix(in srgb,var(--ca,var(--neon-a)) 10%,transparent);
  border:1px solid color-mix(in srgb,var(--ca,var(--neon-a)) 18%,transparent);
  color:var(--ca,var(--neon-a));}
.htp-chevron{font-size:1rem;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.htp-card.open .htp-chevron{transform:rotate(90deg);}

/* ── Body ── */
.htp-body{display:none;padding:0 20px 20px;border-top:1px solid var(--line);}
.htp-card.open .htp-body{display:block;}

/* ── Sections inside body ── */
.htp-section{margin-top:14px;}
.htp-section-title{font-family:var(--font-mono);font-size:.52rem;font-weight:800;
  letter-spacing:.16em;color:var(--muted);margin-bottom:8px;}

/* ── Controls grid ── */
.ctrl-grid{display:flex;flex-wrap:wrap;gap:7px;}
.ctrl-key{display:inline-flex;align-items:center;gap:7px;}
.ctrl-k{font-family:var(--font-mono);font-size:.68rem;font-weight:700;
  background:var(--bg2);border:1.5px solid var(--line2);border-radius:7px;
  padding:5px 10px;color:var(--text);white-space:nowrap;
  box-shadow:0 2px 0 var(--line2);}
.ctrl-v{font-family:var(--font-mono);font-size:.6rem;color:var(--text2);}

/* ── Tips list ── */
.tips-list{list-style:none;}
.tips-list li{font-family:var(--font-mono);font-size:.64rem;color:var(--text2);
  padding:5px 0;border-bottom:1px solid var(--line);line-height:1.6;}
.tips-list li:last-child{border-bottom:none;}
.tips-list li::before{content:"💡 ";margin-right:2px;}

/* ── Rewards row ── */
.reward-row{display:flex;align-items:center;gap:8px;background:var(--bg2);
  border-radius:9px;padding:10px 14px;margin-top:6px;}
.reward-icon{font-size:1.2rem;flex-shrink:0;}
.reward-text{font-family:var(--font-mono);font-size:.64rem;color:var(--text2);line-height:1.5;}

/* ── Play button ── */
.htp-play-btn{display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:.7rem;font-weight:800;
  padding:10px 22px;border-radius:10px;border:none;
  background:var(--ca,var(--neon-a));color:#000;cursor:pointer;
  text-decoration:none;margin-top:14px;transition:filter .12s;}
.htp-play-btn:hover{filter:brightness(1.15);}

.htp-wrap{max-width:720px;width:100%;padding:0 14px 32px;}
</style>
</head>
<body>

  <a class="nav-back" href="index.html">← Hub</a>

<div class="page" style="padding-top:14px;align-items:center;">
<div class="htp-wrap">

  <div style="font-family:var(--font-display);font-size:clamp(2rem,8vw,3.5rem);color:var(--neon-a);
    letter-spacing:.06em;margin-bottom:6px;">HOW TO PLAY</div>
  <p style="font-family:var(--font-mono);font-size:.62rem;color:var(--muted);margin-bottom:18px;">
    Click any game to expand its guide · Controls, tips, and coin rewards
  </p>

  <div class="htp-search">
    <span class="si">🔍</span>
    <input type="text" placeholder="Search games…" id="htp-q" oninput="filterCards(this.value)">
  </div>

  <div class="htp-tabs">
    <button class="htp-tab on" onclick="setTab('all',this)">🎮 All</button>
    <button class="htp-tab" onclick="setTab('classic',this)">🕹 Classic</button>
    <button class="htp-tab" onclick="setTab('board',this)">🎲 Board</button>
    <button class="htp-tab" onclick="setTab('puzzle',this)">🧩 Puzzle</button>
    <button class="htp-tab" onclick="setTab('skill',this)">⚡ Skill</button>
  </div>

  <div id="htp-list"></div>

</div>
</div>

var activeCat='all';

function setTab(cat,el){
  activeCat=cat;
  document.querySelectorAll('.htp-tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  render(document.getElementById('htp-q').value);
}

function filterCards(v){render(v);}

function render(q){
  q=(q||'').toLowerCase().trim();
  var list=document.getElementById('htp-list');
  list.innerHTML='';
  var shown=0;
  GAMES.forEach(function(g){
    if(activeCat!=='all'&&g.cat!==activeCat) return;
    if(q&&(g.name+g.tagline+g.cat).toLowerCase().indexOf(q)<0) return;
    shown++;
    var div=document.createElement('div');
    div.className='htp-card';
    div.style.setProperty('--ca',g.ca);
    var costBadge=g.cost===0
      ?'<span class="htp-badge free">FREE</span>'
      :'<span class="htp-badge cost">🪙 '+g.cost+' entry</span>';
    var diffColors={Easy:'var(--neon-d)',Medium:'var(--neon-c)',Hard:'var(--neon-b)'};
    var ctrlHTML=g.controls.map(function(c){
      return '<div class="ctrl-key"><span class="ctrl-k">'+c.k+'</span><span class="ctrl-v">— '+c.v+'</span></div>';
    }).join('');
    var tipsHTML=g.tips.map(function(t){return '<li>'+t+'</li>';}).join('');
    div.innerHTML='<div class="htp-header" onclick="toggle(this)">'
      +'<div class="htp-icon">'+g.icon+'</div>'
      +'<div class="htp-title-wrap">'
      +'<div class="htp-name">'+g.name+'</div>'
      +'<div class="htp-tagline">'+g.tagline+'</div>'
      +'<div class="htp-badges">'+costBadge
      +'<span class="htp-badge diff" style="color:'+( diffColors[g.diff]||'var(--neon-a)')+'">'+g.diff+'</span>'
      +'</div></div>'
      +'<div class="htp-chevron">▶</div>'
      +'</div>'
      +'<div class="htp-body">'
      +'<div class="htp-section"><div class="htp-section-title">🎯 OBJECTIVE</div>'
      +'<p style="font-family:var(--font-mono);font-size:.65rem;color:var(--text2);line-height:1.7;margin:0">'+g.objective+'</p></div>'
      +'<div class="htp-section"><div class="htp-section-title">⌨️ CONTROLS</div>'
      +'<div class="ctrl-grid">'+ctrlHTML+'</div></div>'
      +'<div class="htp-section"><div class="htp-section-title">💡 TIPS & TRICKS</div>'
      +'<ul class="tips-list">'+tipsHTML+'</ul></div>'
      +'<div class="htp-section"><div class="htp-section-title">🪙 COIN REWARDS</div>'
      +'<div class="reward-row"><div class="reward-icon">🪙</div>'
      +'<div class="reward-text">'+g.reward+'</div></div></div>'
      +'<a class="htp-play-btn" href="'+g.id+'.html" style="background:'+g.ca+';color:#000">▶ PLAY '+g.name.toUpperCase()+'</a>'
      +'</div>';
    list.appendChild(div);
    /* Auto-expand if only one result */
    if(q) div.classList.add('open');
  });
  if(!shown){
    list.innerHTML='<div style="text-align:center;padding:44px;font-family:var(--font-mono);font-size:.78rem;color:var(--muted);">No games found for "'+q+'"</div>';
  }
}

function toggle(header){
  var card=header.closest('.htp-card');
  card.classList.toggle('open');
}

/* Expand from URL hash e.g. howtoplay.html#tetris */
render('');
if(location.hash){
  var id=location.hash.slice(1);
  var cards=document.querySelectorAll('.htp-card');
  cards.forEach(function(c){
    if(c.querySelector('a[href="'+id+'.html"]')) c.classList.add('open');
  });
}
</script>
