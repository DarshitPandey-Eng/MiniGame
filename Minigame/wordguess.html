<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Guess — Arcade Zone</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070f">
<script src="supabase.js"></script>
<script src="coins.js"></script>
<script src="sound.js"></script>
<script src="game-ui.js"></script>
<script src="mp.js"></script>
<style>
:root{--accent:var(--neon-a);}
.wg-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:500px;padding:0 12px 24px;}

/* Board */
.wg-board{display:flex;flex-direction:column;gap:6px;}
.wg-row{display:flex;gap:6px;}
.wg-cell{
  width:clamp(48px,13vw,64px); height:clamp(48px,13vw,64px);
  border:2.5px solid var(--line2); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:clamp(1.4rem,5vw,2rem);
  font-weight:900; background:var(--card-bg); color:var(--text);
  user-select:none; -webkit-user-select:none;
  transition:border-color .1s, background .3s, color .3s;
}
.wg-cell.active{border-color:var(--text2);}
.wg-cell.pop{animation:cellPop .1s ease;}
@keyframes cellPop{0%,100%{transform:scale(1)}50%{transform:scale(1.12);border-color:var(--text);}}
.wg-cell.shake{animation:cellShake .4s ease;}
@keyframes cellShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.wg-cell.correct{background:#538d4e;border-color:#538d4e;color:#fff;}
.wg-cell.present{background:#b59f3b;border-color:#b59f3b;color:#fff;}
.wg-cell.absent{background:#3a3a3c;border-color:#3a3a3c;color:#999;}

/* Keyboard */
.wg-kbd{display:flex;flex-direction:column;gap:6px;width:100%;}
.kbd-row{display:flex;gap:5px;justify-content:center;}
.kbd-key{
  height:clamp(44px,11vw,56px); min-width:clamp(28px,8vw,40px);
  border-radius:6px; border:1px solid var(--line2);
  background:var(--bg2); color:var(--text);
  font-family:var(--font-mono); font-size:.72rem; font-weight:700;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
  transition:background .15s, color .15s, transform .08s;
  display:flex; align-items:center; justify-content:center;
  padding:0 4px; flex:1; max-width:clamp(28px,8vw,40px);
}
.kbd-key.wide{max-width:60px; font-size:.6rem;}
.kbd-key:active{transform:scale(.9);}
.kbd-key.correct{background:#538d4e;color:#fff;border-color:#538d4e;}
.kbd-key.present{background:#b59f3b;color:#fff;border-color:#b59f3b;}
.kbd-key.absent{background:#3a3a3c;color:#777;border-color:#3a3a3c;}

/* Message */
.wg-msg{font-family:var(--font-mono);font-size:.8rem;font-weight:700;color:var(--text);text-align:center;min-height:1.4rem;letter-spacing:.04em;}
.wg-msg.error{color:var(--neon-b);}
.wg-msg.win{color:var(--neon-d);}

/* Stats */
.wg-stats{display:flex;gap:8px;width:100%;}
.wg-stat{flex:1;background:var(--card-bg);border:1px solid var(--line2);border-radius:8px;padding:8px;text-align:center;}
.wg-stat .v{font-family:var(--font-display);font-size:1.5rem;color:var(--neon-a);}
.wg-stat .l{font-family:var(--font-mono);font-size:.46rem;color:var(--muted);letter-spacing:.1em;}

/* Battle HUD */
.battle-hud{position:fixed;top:56px;left:0;right:0;z-index:200;display:none;
  background:color-mix(in srgb,var(--neon-b) 12%,var(--bg1));
  border-bottom:1.5px solid color-mix(in srgb,var(--neon-b) 35%,transparent);
  padding:6px 14px;font-family:var(--font-mono);font-size:.62rem;align-items:center;gap:12px;}
.battle-hud.show{display:flex;}
.bh-dot{width:7px;height:7px;border-radius:50%;background:var(--neon-b);animation:bhPulse 1s ease infinite;flex-shrink:0;}
@keyframes bhPulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<nav class="nav" id="main-nav">
  <a class="nav-back" href="index.html">← Hub</a>
  <div class="nav-sep"></div>
  <div class="nav-title"><span class="dot" style="background:var(--neon-a);box-shadow:0 0 8px var(--neon-a)"></span>WORD GUESS</div>
  <a class="coin-nav" href="wallet.html"><span>🪙</span><span class="az-bal">0</span></a>
  <button class="theme-btn" id="tb">🌙</button>
</nav>

<div class="battle-hud" id="battle-hud">
  <div class="bh-dot"></div>
  <span style="color:var(--muted);font-size:.54rem">⚔ BATTLE</span>
  <span style="color:var(--neon-b);font-weight:700" id="bh-me">You: —</span>
  <span style="color:var(--muted);font-size:.54rem">vs</span>
  <span style="color:var(--text2)" id="bh-opp">Opponent: playing…</span>
  <span style="margin-left:auto;color:var(--muted);font-size:.52rem" id="bh-time">⏱ 0s</span>
</div>

<div class="page" style="padding-top:14px;align-items:center;">
<div class="wg-wrap">

  <div class="wg-stats">
    <div class="wg-stat"><div class="v" id="wg-wins">0</div><div class="l">WINS</div></div>
    <div class="wg-stat"><div class="v" id="wg-streak" style="color:var(--neon-c)">0</div><div class="l">STREAK</div></div>
    <div class="wg-stat"><div class="v" id="wg-played">0</div><div class="l">PLAYED</div></div>
  </div>

  <div class="wg-msg" id="wg-msg">Guess the 5-letter word!</div>

  <div class="wg-board" id="wg-board"></div>

  <div class="wg-kbd" id="wg-kbd"></div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
    <button class="btn filled" style="--c:var(--neon-a)" onclick="newGame()">▶ NEW WORD</button>
    <button class="btn" style="--c:var(--neon-a);font-size:.72rem;display:none" id="share-btn" onclick="doShare()">📤 Share</button>
    <a class="btn" style="--c:var(--neon-e);font-size:.72rem" href="battle.html">⚔ Battle</a>
  </div>

  <div id="opp-panel" style="font-family:var(--font-mono);font-size:.6rem;color:var(--muted);text-align:center;min-height:1rem;"></div>

  <div style="font-family:var(--font-mono);font-size:.58rem;color:var(--muted);text-align:center;line-height:2;">
    🟩 Correct spot &nbsp;·&nbsp; 🟨 Wrong spot &nbsp;·&nbsp; ⬛ Not in word
  </div>

</div>
</div>

<script>
/* ── Theme ── */
var _tb=document.getElementById('tb');
function _sT(){_tb.textContent=CoinEngine.getTheme()==='dark'?'☀️':'🌙';}
_tb.addEventListener('click',function(){CoinEngine.toggleTheme();_sT();}); _sT();

/* ══ WORD LISTS ══ */
var WORDS = [
  'APPLE','BRAVE','FLAME','GRACE','HEART','KNIFE','LEMON','MAGIC','NERVE','OCEAN',
  'PIANO','QUEST','RIVER','SOLAR','TIGER','VIVID','WHALE','YIELD','ZEBRA','AMBER',
  'BLOOM','DAISY','EMBER','FROST','GLOBE','HONEY','JOINT','KARMA','LASER','MIMIC',
  'NINJA','ORBIT','PIXEL','QUIRK','RADAR','STORM','TORCH','UNITY','VAPOR','WINDY',
  'YACHT','ALIEN','BLACK','CLOUD','DEPTH','EARTH','FENCE','GLASS','HAVEN','JUDGE',
  'KNEEL','LUNAR','MANOR','NIGHT','OLIVE','PLANT','QUEEN','RAVEN','SHINE','TREND',
  'VISIT','EXTRA','AZURE','BERRY','CANDY','DELTA','EVENT','GAMER','HORSE','IRONY',
  'JEWEL','LIGHT','MUSIC','NOVEL','OZONE','POWER','RAISE','SPEED','TRIBE','VENUE',
  'WORLD','ANGEL','BEACH','CLICK','DREAM','EXACT','FANCY','GREET','IDEAL','JUICE',
  'KNOWN','LUCKY','MARSH','NICHE','OFFER','PLAIN','RALLY','SCARF','TOWER','VIOLA',
  'WRIST','AGILE','BLEND','CHARM','DINER','EQUAL','FAIRY','HOVER','JOKER','KNACK',
  'LATCH','MANGO','NUDGE','OAKEN','PASTA','REIGN','SNACK','THORN','VENOM','WOVEN',
  'SUGAR','PRISM','FLUTE','CROWN','PILOT','BREAD','GLOOM','PRIDE','BRISK','DWARF',
  'FAULT','CRISP','BOXER','ACUTE','BLAZE','CABIN','CARGO','CEDAR','CHAOS','CIVIC',
  'CLAMP','CLASH','CLIFF','CLIMB','CLOCK','CLOTH','COMET','CORAL','COURT','COVER',
  'CRACK','CRAFT','CRASH','CRATE','CRAWL','CROSS','CROWD','CRUSH','CRUST','CURVE',
  'CYCLE','DRAFT','DRAIN','DRAPE','DRINK','DRIVE','DRONE','DROWN','EAGER','EASEL',
  'ELBOW','ELITE','EPOCH','EVOKE','EXIST','FABLE','FLAIR','FLANK','FLASH','FLESH',
  'FLOCK','FLOOD','FLORA','FLUID','FLUSH','FOCUS','FORCE','FORGE','FRAME','FRANK',
  'FREAK','FRESH','FRISK','DUSKY','DUSTY','DWELT','CAMEO','CHESS','EXPEL','YAWNS',
];

var VALID = (function(){
  var extra = [
    'HOUSE','THERE','THEIR','WHICH','COULD','WOULD','ABOUT','AFTER','THINK','THESE',
    'WHERE','THOSE','NEVER','EVERY','STILL','WHILE','PLACE','GREAT','AGAIN','THREE',
    'SMALL','LARGE','OFTEN','ALONG','AMONG','BRING','MIGHT','GIVEN','SINCE','BEING',
    'UNTIL','GOING','DOING','COMES','WHOLE','OTHER','FIRST','FOUND','SHALL','WHOSE',
    'TRULY','QUITE','TAKEN','USING','THANK','STAND','LEARN','REACH','TEACH','SPEAK',
    'WRITE','START','SPEND','SOUND','ROUND','POINT','HANDS','TEARS','LAUGH','SMILE',
    'PHONE','MONEY','SPORT','WATER','STONE','PARTY','TABLE','CHAIR','FLOOR','DRINK',
    'SLEEP','DREAM','THING','LEAVE','SPACE','WATCH','CHECK','CLOSE','COUNT','BREAK',
    'BUILD','CATCH','CLEAN','CARRY','AGREE','APPLY','ARGUE','AVOID','BASIC','CAUSE',
    'CLAIM','SHARE','SOUTH','NORTH','THROW','TRUST','UNDER','UNION','UPPER','VALUE',
    'VOICE','WASTE','WOMAN','WOMEN','WORDS','WORKS','WORTH','WRONG','YEARS','YOUTH',
    'ABOVE','ADMIT','ADOPT','ADULT','AHEAD','ALARM','ALBUM','ALERT','ALIKE','ALIVE',
    'HONOR','TOTAL','HUMAN','IMAGE','INNER','INPUT','ISSUE','KNIFE','LABEL','LATER',
    'LAYER','LEAST','LEVEL','LIMIT','LIVES','LOCAL','LOWER','MAJOR','MARCH','MATCH',
    'MAYBE','MEANS','MEDIA','MINDS','MINOR','MODEL','MORAL','MOUNT','MOUSE','MOUTH',
    'NAMED','NEEDS','ORDER','OWNED','PAGES','PANEL','PAPER','PARTS','PATHS','PAUSE',
    'PEAKS','PIECE','PITCH','PLANS','PLAYS','BLANK','BLAST','BLOCK','BLOOD','BLOWN',
    'BLUES','BLUNT','BOARD','BOOST','BOOTS','BOUND','BRACE','BRAND','BRASH','BRAWL',
    'BREED','BROAD','BROOD','BROOK','BROOM','BROWN','BRUSH','BUDDY','BULLS','BUNCH',
    'BURST','BUYER','CACHE','CARDS','CHASE','CHEAP','CHEAT','CHEEK','CHEER','CHIEF',
  ];
  var all = WORDS.slice();
  extra.forEach(function(w){ if(all.indexOf(w)<0) all.push(w); });
  return all;
})();

/* ══ STATE ══ */
var target = '';
var guesses = [];    /* [{word:'APPLE', result:['correct','absent',...]}] */
var currentWord = '';
var currentRow = 0;
var gameOver = false;
var wins = 0, streak = 0, played = 0;
var kbColors = {};   /* letter -> 'correct'|'present'|'absent' */

/* ══ MULTIPLAYER ══ */
var _MP = AZMulti.parseParams();
var _mpSeed  = _MP.seed   || null;
var _mpRoom  = _MP.room   || null;
var _mpPid   = _MP.pid    || 1;
var _mpPname = _MP.pname  || 'You';
var _mpCMode = _MP.cscore !== null;
var _mpCScore= _MP.cscore || 0;
var _mpCName = _MP.cname  || 'Challenger';
var _mpCGen  = !!_MP.seed && (new URLSearchParams(location.search)).get('cmode');
var _mpRng   = _mpSeed ? AZMulti.seededRng(_mpSeed) : null;
var _stopPoll= null;

/* ══ GAME FUNCTIONS ══ */

function newGame() {
  target = _mpRng
    ? WORDS[Math.floor(_mpRng() * WORDS.length)]
    : WORDS[Math.floor(Math.random() * WORDS.length)];
  guesses = [];
  currentWord = '';
  currentRow = 0;
  gameOver = false;
  kbColors = {};
  played++;
  document.getElementById('wg-played').textContent = played;
  document.getElementById('share-btn').style.display = 'none';
  setMsg(_mpCMode ? ('Beat ' + _mpCName + ' (' + _mpCScore + ' tries)') : 'Guess the 5-letter word!', '');
  buildBoard();
  buildKeyboard();
  SoundEngine.play('start');
  if (_mpRoom && _mpRoom !== 'OFFLINE' && AZMulti.isConfigured()) {
    _stopPoll = AZMulti.pollRoom(_mpRoom, function(room){ updateOppPanel(room); });
  }
}

/* Build the 6x5 grid */
function buildBoard() {
  var board = document.getElementById('wg-board');
  board.innerHTML = '';
  for (var r = 0; r < 6; r++) {
    var rowDiv = document.createElement('div');
    rowDiv.className = 'wg-row';
    rowDiv.id = 'wg-row-' + r;
    for (var c = 0; c < 5; c++) {
      var cell = document.createElement('div');
      cell.className = 'wg-cell';
      cell.id = 'wg-cell-' + r + '-' + c;
      rowDiv.appendChild(cell);
    }
    board.appendChild(rowDiv);
  }
}

/* Update the current typing row */
function updateRow() {
  for (var c = 0; c < 5; c++) {
    var cell = document.getElementById('wg-cell-' + currentRow + '-' + c);
    if (!cell) continue;
    cell.textContent = currentWord[c] || '';
    cell.className = 'wg-cell' + (currentWord[c] ? ' active' : '');
  }
}

/* Colour a completed row — no animation, just directly set classes */
function colorRow(rowIndex, wordStr, result) {
  for (var c = 0; c < 5; c++) {
    var cell = document.getElementById('wg-cell-' + rowIndex + '-' + c);
    if (!cell) continue;
    cell.textContent = wordStr[c];
    cell.className = 'wg-cell ' + result[c];
  }
}

/* Build on-screen keyboard */
function buildKeyboard() {
  var kbd = document.getElementById('wg-kbd');
  kbd.innerHTML = '';
  var rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  rows.forEach(function(keyRow) {
    var rowDiv = document.createElement('div');
    rowDiv.className = 'kbd-row';
    keyRow.forEach(function(k) {
      var btn = document.createElement('button');
      btn.className = 'kbd-key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.id = 'kb-' + k;
      var col = kbColors[k];
      if (col) btn.classList.add(col);
      btn.addEventListener('click', function() { onKey(k); });
      rowDiv.appendChild(btn);
    });
    kbd.appendChild(rowDiv);
  });
}

/* Update keyboard colors for a letter */
function updateKeyColor(letter, result) {
  var prev = kbColors[letter];
  if (result === 'correct') {
    kbColors[letter] = 'correct';
  } else if (result === 'present' && prev !== 'correct') {
    kbColors[letter] = 'present';
  } else if (!prev) {
    kbColors[letter] = 'absent';
  }
  var btn = document.getElementById('kb-' + letter);
  if (btn) {
    btn.className = 'kbd-key' + (letter.length > 1 ? ' wide' : '');
    if (kbColors[letter]) btn.classList.add(kbColors[letter]);
  }
}

/* Evaluate guess against target */
function evaluate(guess, tgt) {
  var result = ['absent','absent','absent','absent','absent'];
  var tArr = tgt.split('');
  var used = [false,false,false,false,false];
  /* Pass 1: correct */
  for (var i = 0; i < 5; i++) {
    if (guess[i] === tArr[i]) { result[i] = 'correct'; used[i] = true; }
  }
  /* Pass 2: present */
  for (var i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    for (var j = 0; j < 5; j++) {
      if (!used[j] && guess[i] === tArr[j]) { result[i] = 'present'; used[j] = true; break; }
    }
  }
  return result;
}

/* Handle a key press */
function onKey(k) {
  if (gameOver) return;
  if (k === '⌫') {
    if (currentWord.length > 0) {
      currentWord = currentWord.slice(0, -1);
      updateRow();
    }
    return;
  }
  if (k === 'ENTER') {
    submitGuess();
    return;
  }
  if (currentWord.length < 5 && /^[A-Z]$/.test(k)) {
    currentWord += k;
    updateRow();
    /* pop animation on the new cell */
    var cell = document.getElementById('wg-cell-' + currentRow + '-' + (currentWord.length-1));
    if (cell) {
      cell.classList.remove('pop');
      void cell.offsetWidth;
      cell.classList.add('pop');
    }
    SoundEngine.play('key');
  }
}

/* Submit a guess */
function submitGuess() {
  if (currentWord.length < 5) {
    shakeCurrentRow();
    setMsg('Not enough letters!', 'error');
    setTimeout(function(){ setMsg('', ''); }, 1200);
    return;
  }
  if (VALID.indexOf(currentWord) < 0) {
    shakeCurrentRow();
    setMsg('Not in word list!', 'error');
    setTimeout(function(){ setMsg('', ''); }, 1200);
    return;
  }

  var result = evaluate(currentWord, target);
  var wordStr = currentWord;
  guesses.push({ word: wordStr, result: result });

  /* Color the row immediately */
  colorRow(currentRow, wordStr, result);

  /* Update keyboard colors */
  for (var i = 0; i < 5; i++) {
    updateKeyColor(wordStr[i], result[i]);
  }

  var won = result.every(function(r) { return r === 'correct'; });
  currentRow++;
  currentWord = '';

  if (won) {
    gameOver = true;
    wins++; streak++;
    document.getElementById('wg-wins').textContent = wins;
    document.getElementById('wg-streak').textContent = streak;
    var reward = Math.max(5, (8 - currentRow) * 5);
    var msgs = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
    setMsg(msgs[currentRow-2] || 'Nice!', 'win');
    CoinEngine.add(reward, 'Word Guess solved in ' + (currentRow-1), '📝');
    CoinEngine.recordGame('wordguess', reward, true, { tries: currentRow-1 });
    CoinEngine.toast('+' + reward + ' 🪙  Solved in ' + (currentRow-1) + '!', 'coin');
    SoundEngine.play('success');
    document.getElementById('share-btn').style.display = 'inline-flex';
    mpDone(currentRow-1, true);
  } else if (currentRow >= 6) {
    gameOver = true;
    streak = 0;
    document.getElementById('wg-streak').textContent = 0;
    setMsg('The word was: ' + target, 'error');
    CoinEngine.recordGame('wordguess', 0, false, {});
    SoundEngine.play('gameover');
    document.getElementById('share-btn').style.display = 'inline-flex';
    mpDone(7, false);
  } else {
    /* Continue — prepare next row */
    setMsg('', '');
    updateRow(); /* clear current row display */
    SoundEngine.play('key');
  }
}

function shakeCurrentRow() {
  for (var c = 0; c < 5; c++) {
    var cell = document.getElementById('wg-cell-' + currentRow + '-' + c);
    if (cell) { cell.classList.remove('shake'); void cell.offsetWidth; cell.classList.add('shake'); }
  }
  SoundEngine.play('error');
}

function setMsg(txt, type) {
  var el = document.getElementById('wg-msg');
  el.textContent = txt;
  el.className = 'wg-msg' + (type ? ' ' + type : '');
}

/* Share */
function doShare() {
  var emoji = guesses.map(function(g) {
    return g.result.map(function(r){
      return r==='correct'?'🟩':r==='present'?'🟨':'⬛';
    }).join('');
  }).join('\n');
  var tries = gameOver && guesses[guesses.length-1] && guesses[guesses.length-1].result.every(function(r){return r==='correct';})
    ? (currentRow-1) : 'X';
  var txt = '📝 Word Guess ' + tries + '/6\n' + emoji + '\nPlay free: ' + window.location.origin;
  if (_mpSeed || _mpCGen) {
    var seed = _mpSeed || AZMulti.makeSeed();
    var link = AZMulti.buildChallengeLink('wordguess', seed, tries, localStorage.getItem('az_mp_name')||'Friend');
    txt = '📝 Word Guess ' + tries + '/6\n' + emoji + '\n⚔️ Beat me! ' + link;
  }
  if (navigator.share) { navigator.share({title:'Word Guess',text:txt}).catch(function(){}); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(txt).then(function(){ CoinEngine.toast('Copied!','info'); }); }
}

/* Keyboard and physical keys */
document.addEventListener('keydown', function(e) {
  if (gameOver) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') { onKey('ENTER'); }
  else if (e.key === 'Backspace') { onKey('⌫'); }
  else if (/^[a-zA-Z]$/.test(e.key)) { onKey(e.key.toUpperCase()); }
});

/* ══ MULTIPLAYER ══ */
function mpDone(score, won) {
  if (_stopPoll) { _stopPoll(); _stopPoll = null; }
  var name = localStorage.getItem('az_mp_name') || 'Player';
  AZMulti.submitScore('wordguess', won ? (7-score) : 0, name, {tries:score, word:target});
  if (_mpCMode && !_mpRoom) {
    var beat = won && score < _mpCScore, tie = won && score === _mpCScore;
    setTimeout(function(){
      var msg = beat ? ('🏆 Beat ' + _mpCName + '! (' + score + ' vs ' + _mpCScore + ')')
              : tie  ? '🤝 Tie!'
              : won  ? ('✅ Solved, but ' + _mpCName + ' was faster')
              :        ('❌ ' + _mpCName + ' wins');
      CoinEngine.toast(msg, beat||tie?'coin':'info');
    }, 500);
    return;
  }
  if (_mpCGen) {
    setTimeout(function(){
      document.getElementById('share-btn').textContent='📤 Share Challenge';
      CoinEngine.toast('Challenge ready!','info');
    }, 400);
    return;
  }
  if (_mpRoom && _mpRoom !== 'OFFLINE' && AZMulti.isConfigured()) {
    AZMulti.markDoneAndCheck(_mpRoom, _mpPid, score, 'wordguess').then(function(result){
      if (result) { window.location.href = AZMulti.resultUrl(result, _mpPid); }
      else { window.location.href = 'result.html?room='+encodeURIComponent(_mpRoom)+'&game=wordguess&me='+_mpPid; }
    }).catch(function(){});
  }
}

function updateOppPanel(room) {
  var oppScore = _mpPid===1 ? room.p2_score : room.p1_score;
  var oppDone  = _mpPid===1 ? room.p2_done  : room.p1_done;
  var oppName  = _mpPid===1 ? room.p2_name  : room.p1_name;
  var p = document.getElementById('opp-panel');
  if (p) p.textContent = (oppName||'Opp') + ': ' + (oppDone ? '✓ '+oppScore+' tries' : 'playing…');
  if (oppDone && !gameOver) CoinEngine.toast((oppName||'Opp')+' finished in '+oppScore+' tries!','info');
}

/* Battle HUD */
(function(){
  var room = (new URLSearchParams(location.search)).get('room');
  if (!room || room==='OFFLINE') return;
  var hud = document.getElementById('battle-hud');
  if (hud) hud.classList.add('show');
  var name = localStorage.getItem('az_mp_name')||'You';
  var t0 = Date.now();
  setInterval(function(){
    var el = document.getElementById('bh-time');
    if (el) el.textContent = '⏱ '+Math.floor((Date.now()-t0)/1000)+'s';
  }, 1000);
  var meEl = document.getElementById('bh-me');
  if (meEl) meEl.textContent = '👤 '+name+': playing';
})();

/* Challenge mode toast */
if (_mpCMode) {
  setTimeout(function(){
    CoinEngine.toast('Beat '+_mpCName+"'s score of "+_mpCScore+' tries!','info');
  }, 600);
}

/* ══ START ══ */
newGame();
</script>
