<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snakes & Ladders — Arcade Zone</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="coins.js"></script>
<script src="sound.js"></script>
<script src="game-ui.js"></script>
<style>
:root{--accent:var(--neon-d);}
.sl-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:440px;padding:0 8px 20px;}
#sl-cv{display:block;border-radius:10px;border:2px solid var(--line2);}
.sl-panel{display:flex;gap:8px;width:100%;align-items:stretch;}
.sl-info{flex:1;background:var(--card-bg);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.sl-dice-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.sl-dice{width:64px;height:64px;background:var(--card-bg);border:2px solid var(--line2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.4rem;transition:transform .15s;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.sl-dice:active{transform:scale(.9);}
.sl-dice.rolling{animation:diceRoll .5s ease;}
@keyframes diceRoll{0%{transform:rotate(0)scale(1)}25%{transform:rotate(-20deg)scale(1.1)}50%{transform:rotate(20deg)scale(0.9)}75%{transform:rotate(-10deg)scale(1.05)}100%{transform:rotate(0)scale(1)}}
.sl-player{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;border:1.5px solid transparent;transition:all .2s;}
.sl-player.active{border-color:var(--neon-a);background:color-mix(in srgb,var(--neon-a) 8%,transparent);}
.sl-player .tok{font-size:1.4rem;}
.sl-player .nm{font-family:var(--font-mono);font-size:.65rem;font-weight:700;color:var(--text2);}
.sl-player .sq{font-family:var(--font-display);font-size:1rem;color:var(--neon-a);}
.sl-status{font-family:var(--font-mono);font-size:.72rem;color:var(--text2);text-align:center;line-height:1.6;min-height:2.4rem;}
.sl-btn{font-family:var(--font-mono);font-size:.72rem;font-weight:800;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;}
.sl-roll-btn{background:var(--neon-a);color:#000;}
.sl-roll-btn:disabled{opacity:.4;cursor:default;}
</style>
</head>
<body>
<nav class="nav" id="main-nav">
  <a class="nav-back" href="index.html">← Hub</a>
  <div class="nav-sep"></div>
  <div class="nav-title"><span class="dot" style="background:var(--neon-d);box-shadow:0 0 8px var(--neon-d)"></span>SNAKES & LADDERS</div>
  <a class="coin-nav" href="wallet.html"><span>🪙</span><span class="az-bal">0</span></a>
  <button class="theme-btn" id="tb">🌙</button>
</nav>
<div class="page" style="padding-top:12px;align-items:center;">
<div class="sl-wrap">

  <div class="sl-panel">
    <canvas id="sl-cv"></canvas>
    <div class="sl-info">
      <div class="sl-player" id="p1-row">
        <span class="tok">🔴</span>
        <div><div class="nm">YOU</div><div class="sq" id="p1-sq">1</div></div>
      </div>
      <div class="sl-player" id="p2-row">
        <span class="tok">🔵</span>
        <div><div class="nm">CPU</div><div class="sq" id="p2-sq">1</div></div>
      </div>
      <div class="sl-dice-wrap">
        <div class="sl-dice" id="sl-dice">🎲</div>
        <button class="sl-btn sl-roll-btn" id="roll-btn" onclick="rollDice()">ROLL</button>
      </div>
      <div class="sl-status" id="sl-status">Tap ROLL to start!</div>
    </div>
  </div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
    <button class="btn filled" style="--c:var(--neon-d)" onclick="newGame()">▶ NEW GAME (🪙 5)</button>
    <button class="btn" style="--c:var(--neon-a);font-size:.72rem" onclick="doShare()">📤 Share</button>
  </div>

  <div style="font-family:var(--font-mono);font-size:.58rem;color:var(--muted);text-align:center;line-height:1.8;">
    🪜 Climb ladders to jump ahead · 🐍 Land on snakes to slide back<br>First to reach square 100 wins!
  </div>

</div>
</div>
<script>
/* Theme */
var _tb=document.getElementById('tb');
function _sT(){_tb.textContent=CoinEngine.getTheme()==='dark'?'☀️':'🌙';}
_tb.addEventListener('click',function(){CoinEngine.toggleTheme();_sT();drawBoard();}); _sT();

/* ── Board definitions ── */
var SNAKES={97:78,95:56,88:24,62:18,48:26,36:6,32:10};
var LADDERS={1:38,4:14,9:31,20:38,28:84,40:59,51:67,63:81,71:91};
/* alternate snake/ladder emoji sets */
var SNAKE_FACES=['🐍','🐍','🐍','🐍','🐍','🐍'];
var LADDER_FACE='🪜';

var cv=document.getElementById('sl-cv');
var ctx=cv.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1,2);
var CS; /* cell size */

function initCanvas(){
  var maxW=Math.min(window.innerWidth-170,280);
  CS=Math.max(20,Math.floor(maxW/10));
  cv.style.width=(10*CS)+'px'; cv.style.height=(10*CS)+'px';
  cv.width=10*CS*DPR; cv.height=10*CS*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
initCanvas();
window.addEventListener('resize',function(){initCanvas();drawBoard();});

/* ── State ── */
var pos=[1,1],turn=0,rolling=false,gameOver=false,started=false;
var wins=0,losses=0;
var DICE_EMOJI=['⚀','⚁','⚂','⚃','⚄','⚅'];
var lastRoll=0;

function newGame(){
  if(!CoinEngine.spend(5)){CoinEngine.toast('Not enough coins!','warn');return;}
  pos=[1,1];turn=0;rolling=false;gameOver=false;started=true;
  setStatus('🎲 Your turn — roll the dice!');
  setActive(0);
  document.getElementById('roll-btn').disabled=false;
  drawBoard();
  SoundEngine.play('start');
}

function setStatus(msg){document.getElementById('sl-status').textContent=msg;}
function setActive(p){
  document.getElementById('p1-row').className='sl-player'+(p===0?' active':'');
  document.getElementById('p2-row').className='sl-player'+(p===1?' active':'');
}

/* ── Square to row/col (zigzag board, 1=bottom-left) ── */
function sqToXY(sq){
  var s=sq-1;
  var row=Math.floor(s/10);    /* 0=bottom, 9=top */
  var col=s%10;
  if(row%2===1) col=9-col;    /* odd rows go right→left */
  return {x:col,y:9-row};     /* y: 0=top, 9=bottom */
}

/* ── Roll ── */
function rollDice(){
  if(!started){newGame();return;}
  if(rolling||gameOver||turn!==0)return;
  var dice=document.getElementById('sl-dice');
  var btn=document.getElementById('roll-btn');
  rolling=true; btn.disabled=true;
  dice.classList.add('rolling');
  /* animate dice */
  var count=0, anim=setInterval(function(){
    dice.textContent=DICE_EMOJI[Math.floor(Math.random()*6)];
    count++;
    if(count>=8){
      clearInterval(anim);
      lastRoll=Math.floor(Math.random()*6)+1;
      dice.textContent=DICE_EMOJI[lastRoll-1];
      dice.classList.remove('rolling');
      movePlayer(0,lastRoll,function(){
        if(!gameOver) setTimeout(cpuTurn,700);
      });
    }
  },60);
}

function movePlayer(player,steps,callback){
  var from=pos[player];
  var target=Math.min(100,from+steps);
  SoundEngine.play('slide');
  animateMove(player,from,target,function(){
    var landed=pos[player];
    /* check snake or ladder */
    if(SNAKES[landed]!==undefined){
      var dest=SNAKES[landed];
      setStatus((player===0?'🐍 Snake!':'🐍 CPU hit a snake!')+'  '+landed+' → '+dest);
      SoundEngine.play('die');
      setTimeout(function(){animateMove(player,landed,dest,function(){checkWin(player,callback);});},400);
    } else if(LADDERS[landed]!==undefined){
      var dest=LADDERS[landed];
      setStatus((player===0?'🪜 Ladder!':'🪜 CPU climbed a ladder!')+'  '+landed+' → '+dest);
      SoundEngine.play('levelup');
      setTimeout(function(){animateMove(player,landed,dest,function(){checkWin(player,callback);});},400);
    } else {
      checkWin(player,callback);
    }
  });
}

function animateMove(player,from,to,callback){
  var step=from<to?1:-1;
  var cur=from;
  var interval=setInterval(function(){
    cur+=step;
    pos[player]=cur;
    updateSqUI();
    drawBoard();
    if(cur===to){clearInterval(interval);callback();}
  },80);
}

function updateSqUI(){
  document.getElementById('p1-sq').textContent='Sq '+pos[0];
  document.getElementById('p2-sq').textContent='Sq '+pos[1];
}

function checkWin(player,callback){
  if(pos[player]>=100){
    pos[player]=100; drawBoard(); updateSqUI();
    gameOver=true; rolling=false;
    if(player===0){
      wins++;
      SoundEngine.play('success');
      setStatus('🎉 You reached 100! You WIN!');
      CoinEngine.add(20,'Snakes & Ladders — win','🎲');
      CoinEngine.recordGame('snakesladders',20,true,{});
      CoinEngine.toast('+20 🪙 You win!','success');
    } else {
      losses++;
      SoundEngine.play('gameover');
      setStatus('😔 CPU reached 100! Better luck next time.');
      CoinEngine.recordGame('snakesladders',0,false,{});
    }
    document.getElementById('roll-btn').disabled=true;
    if(callback)callback();
    return;
  }
  if(callback)callback();
}

function cpuTurn(){
  setActive(1);turn=1;
  var roll=Math.floor(Math.random()*6)+1;
  document.getElementById('sl-dice').textContent=DICE_EMOJI[roll-1];
  setStatus('🔵 CPU rolled '+roll+'...');
  SoundEngine.play('slide');
  movePlayer(1,roll,function(){
    if(!gameOver){
      turn=0; rolling=false;
      setActive(0);
      setStatus('🎲 Your turn — roll the dice!');
      document.getElementById('roll-btn').disabled=false;
    }
  });
}

/* ── Drawing ── */
var CELL_COLORS_DARK =[['#12122a','#1a1a38'],['#1a1a38','#12122a']];
var CELL_COLORS_LIGHT=[['#d8daf0','#eeeef8'],['#eeeef8','#d8daf0']];

function drawBoard(){
  var isDark=CoinEngine.getTheme()==='dark';
  var pal=isDark?CELL_COLORS_DARK:CELL_COLORS_LIGHT;
  var W=10*CS,H=10*CS;
  ctx.clearRect(0,0,W,H);

  /* cells */
  for(var r=0;r<10;r++){
    for(var c=0;c<10;c++){
      ctx.fillStyle=pal[(r+c)%2][0];
      ctx.fillRect(c*CS,r*CS,CS,CS);
    }
  }

  /* numbers */
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=isDark?'rgba(255,255,255,.25)':'rgba(0,0,0,.22)';
  ctx.font='bold '+(CS*0.32)+'px monospace';
  for(var sq=1;sq<=100;sq++){
    var xy=sqToXY(sq);
    ctx.fillText(sq,xy.x*CS+CS/2,xy.y*CS+CS*0.2);
  }

  /* snakes */
  ctx.lineWidth=CS*0.18; ctx.lineCap='round';
  Object.keys(SNAKES).forEach(function(from){
    var to=SNAKES[from];
    var a=sqToXY(parseInt(from)), b=sqToXY(to);
    var x1=a.x*CS+CS/2,y1=a.y*CS+CS/2,x2=b.x*CS+CS/2,y2=b.y*CS+CS/2;
    ctx.strokeStyle=isDark?'rgba(255,45,120,.55)':'rgba(200,0,80,.45)';
    ctx.beginPath();ctx.moveTo(x1,y1);
    ctx.bezierCurveTo(x1+CS,y1-CS,x2-CS,y2+CS,x2,y2);
    ctx.stroke();
    /* emoji */
    ctx.font=CS*0.5+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🐍',x1,y1);
  });

  /* ladders */
  ctx.lineWidth=CS*0.14;
  Object.keys(LADDERS).forEach(function(from){
    var to=LADDERS[from];
    var a=sqToXY(parseInt(from)), b=sqToXY(to);
    var x1=a.x*CS+CS/2,y1=a.y*CS+CS/2,x2=b.x*CS+CS/2,y2=b.y*CS+CS/2;
    ctx.strokeStyle=isDark?'rgba(0,230,118,.5)':'rgba(0,160,70,.4)';
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.font=CS*0.5+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🪜',x2,y2);
  });

  /* grid */
  ctx.strokeStyle=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.08)';
  ctx.lineWidth=1;
  for(var i=0;i<=10;i++){ctx.beginPath();ctx.moveTo(i*CS,0);ctx.lineTo(i*CS,H);ctx.stroke();}
  for(var j=0;j<=10;j++){ctx.beginPath();ctx.moveTo(0,j*CS);ctx.lineTo(W,j*CS);ctx.stroke();}

  /* players */
  drawToken(pos[1],'🔵',pos[0]===pos[1]?1:0); /* CPU first so player goes on top */
  drawToken(pos[0],'🔴',pos[0]===pos[1]?-1:0);
}

function drawToken(sq,emoji,offset){
  var xy=sqToXY(sq);
  var cx=xy.x*CS+CS/2+(offset*CS*0.2);
  var cy=xy.y*CS+CS*0.65;
  ctx.font=CS*0.55+'px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,cx,cy);
}

function doShare(){
  var txt='🎲 I played Snakes & Ladders on Arcade Zone! '+wins+' wins vs CPU.\nPlay free: '+window.location.origin;
  if(navigator.share){navigator.share({title:'Arcade Zone',text:txt}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){CoinEngine.toast('Copied!','info');});}
}

/* init */
initCanvas(); drawBoard();
</script>
</body>
</html>
