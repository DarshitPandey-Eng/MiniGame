<style>
:root { --acc: var(--neon-f); }

/* ── Page shell ── */
.shop-page {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; width: 100%; padding: 14px 12px 80px; box-sizing: border-box;
  max-width: 760px; margin: 0 auto;
}

/* ── Balance bar ── */
.bal-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; width: 100%; margin-bottom: 18px;
  background: var(--card-bg); border: 1.5px solid var(--neon-c);
  border-radius: 14px; padding: 12px 20px;
  box-shadow: 0 0 24px color-mix(in srgb,var(--neon-c) 12%,transparent);
}
.bal-icon { font-size: 1.5rem; }
.bal-val {
  font-family: var(--font-display); font-size: clamp(1.8rem,6vw,2.5rem);
  color: var(--neon-c); letter-spacing: .04em; line-height: 1;
}
.bal-lbl {
  font-family: var(--font-mono); font-size: .5rem;
  color: var(--muted); letter-spacing: .14em;
}

/* ── Section header ── */
.shop-section {
  width: 100%; margin-bottom: 6px; margin-top: 18px;
  display: flex; align-items: center; gap: 10px;
}
.shop-section-title {
  font-family: var(--font-display); font-size: clamp(.85rem,3vw,1.1rem);
  color: var(--neon-f); letter-spacing: .12em;
}
.shop-section-line {
  flex: 1; height: 1px;
  background: linear-gradient(to right, color-mix(in srgb,var(--neon-f) 30%,transparent), transparent);
}

/* ── Item grid ── */
.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; width: 100%;
}
@media(min-width:500px) { .shop-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }

/* ── Shop item card ── */
.shop-item {
  background: var(--card-bg); border: 1.5px solid var(--line2);
  border-radius: 14px; padding: 14px 10px 12px; text-align: center;
  cursor: pointer; transition: all .16s; position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  -webkit-tap-highlight-color: transparent;
}
.shop-item:hover { border-color: var(--neon-f); transform: translateY(-3px);
  box-shadow: 0 8px 24px color-mix(in srgb,var(--neon-f) 16%,transparent); }
.shop-item.owned { border-color: var(--neon-d); cursor: default; }
.shop-item.owned:hover { transform: none; box-shadow: none; }
.shop-item.equipped {
  border-color: var(--neon-d);
  background: color-mix(in srgb,var(--neon-d) 10%,var(--card-bg));
  box-shadow: 0 0 20px color-mix(in srgb,var(--neon-d) 20%,transparent);
}
.shop-item.locked { opacity: .55; cursor: not-allowed; }
.shop-item.locked:hover { transform: none; box-shadow: none; border-color: var(--line2); }

/* Preview area */
.si-preview {
  width: 64px; height: 64px; border-radius: 10px;
  background: var(--bg2); border: 1px solid var(--line2);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; overflow: hidden; flex-shrink: 0;
  transition: transform .2s;
}
.shop-item:hover .si-preview { transform: scale(1.08) rotate(-2deg); }
.shop-item.equipped .si-preview { animation: siPulse 2s ease infinite; }
@keyframes siPulse { 0%,100%{box-shadow:0 0 0 transparent} 50%{box-shadow:0 0 14px color-mix(in srgb,var(--neon-d) 55%,transparent)} }

.si-name {
  font-family: var(--font-mono); font-size: .62rem; font-weight: 700;
  color: var(--text); letter-spacing: .05em; line-height: 1.3;
}
.si-desc {
  font-family: var(--font-mono); font-size: .48rem;
  color: var(--muted); line-height: 1.4;
}
.si-cost {
  font-family: var(--font-display); font-size: .95rem;
  color: var(--neon-c); letter-spacing: .04em;
}
.si-status {
  font-family: var(--font-mono); font-size: .52rem; font-weight: 700;
  padding: 3px 9px; border-radius: 5px; letter-spacing: .06em;
}
.si-status.s-own  { color: var(--neon-d); background: color-mix(in srgb,var(--neon-d) 12%,transparent); }
.si-status.s-eq   { color: var(--neon-d); background: color-mix(in srgb,var(--neon-d) 20%,transparent); }
.si-status.s-buy  { color: var(--neon-f); background: color-mix(in srgb,var(--neon-f) 10%,transparent); }
.si-status.s-lock { color: var(--muted); }

/* Level lock badge */
.lv-lock {
  position: absolute; top: 7px; right: 7px;
  font-family: var(--font-mono); font-size: .46rem; font-weight: 700;
  padding: 2px 6px; border-radius: 4px;
  background: var(--bg2); border: 1px solid var(--line2); color: var(--muted);
}

/* ── Confirm modal ── */
.shop-modal {
  position: fixed; inset: 0; z-index: 800;
  background: var(--modal-bg); backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.shop-modal.hidden { display: none; }
.sm-box {
  background: var(--card-bg); border: 1.5px solid var(--neon-f);
  border-radius: 18px; padding: 28px 24px; max-width: 340px; width: 100%;
  text-align: center; box-shadow: 0 0 48px color-mix(in srgb,var(--neon-f) 18%,transparent);
  animation: smIn .22s ease;
}
@keyframes smIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
.sm-preview {
  font-size: 3.5rem; margin: 0 auto 12px;
  width: 80px; height: 80px; border-radius: 14px;
  background: var(--bg2); display: flex; align-items: center; justify-content: center;
}
.sm-title { font-family:var(--font-display); font-size:1.6rem; color:var(--neon-f); margin-bottom:4px; }
.sm-desc  { font-family:var(--font-mono); font-size:.62rem; color:var(--text2); margin-bottom:14px; line-height:1.7; }
.sm-price { font-family:var(--font-display); font-size:2rem; color:var(--neon-c); margin-bottom:16px; }

/* ── Toast-style equip confirmation ── */
@keyframes equipPop {
  0%  { opacity:0; transform:translateY(20px) scale(.9); }
  15% { opacity:1; transform:translateY(0)    scale(1.05); }
  80% { opacity:1; transform:translateY(0)    scale(1); }
  100%{ opacity:0; transform:translateY(-10px); }
}
.equip-toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--card-bg); border: 1.5px solid var(--neon-d);
  border-radius: 12px; padding: 10px 20px; z-index: 900;
  font-family: var(--font-mono); font-size: .7rem; color: var(--neon-d);
  display: flex; align-items: center; gap: 8px; white-space: nowrap;
  box-shadow: 0 4px 24px color-mix(in srgb,var(--neon-d) 25%,transparent);
  animation: equipPop 1.8s ease forwards;
  pointer-events: none;
}
</style>
</head>

<script>

  document.addEventListener('az:balance', function(e){
    document.querySelectorAll('.az-bal').forEach(function(el){ el.textContent = e.detail; });
    document.getElementById('shop-bal').textContent = e.detail;

/* ══════════ STORAGE HELPERS ═══════════════════════════════════ */
var SK = 'az_shop_';
function owned(id)    { try{ return !!JSON.parse(localStorage.getItem(SK+'own')||'{}')[id]; }catch(_){ return false; } }
function equip_get(cat){ try{ return localStorage.getItem(SK+'eq_'+cat)||null; }catch(_){ return null; } }
function equip_set(cat,id){ try{ localStorage.setItem(SK+'eq_'+cat,id); }catch(_){} }
function markOwned(id){
  try{
    var o=JSON.parse(localStorage.getItem(SK+'own')||'{}');
    o[id]=true;
    localStorage.setItem(SK+'own',JSON.stringify(o));
  }catch(_){}
}

  'card_waves': { bg:'#001a2e',   accent:'#00cfff',       pattern:'waves',  label:'Ocean Waves'  },

  'card_geo':   { bg:'#0d0d0d',   accent:'#00e5ff',       pattern:'geo',    label:'Geometric'    },
  'card_holo':  { bg:'#0a001a',   accent:'#ff2d78',       pattern:'holo',   label:'Holographic'  },
};
var TETRIS_THEMES = {
  'default':    ['#00e5ff','#ffe135','#bf5af2','#00e676','#ff2d78','#ff6b35','#00aaff'],
  'tet_pastel': ['#ffb3c1','#ffd6a5','#fdffb6','#caffbf','#a0c4ff','#bdb2ff','#ffc6ff'],
  'tet_matrix': ['#00ff41','#00cc33','#009926','#006619','#00ff41','#00e639','#33ff66'],
  'tet_lava':   ['#ff4500','#ff6b00','#ff8c00','#ffa500','#ff3300','#ff1a00','#cc2200'],
  'tet_galaxy': ['#e040fb','#7c4dff','#448aff','#00e5ff','#ff4081','#ea80fc','#b388ff'],
};

/* Public API — used by shop page AND by games (loaded via script tag or localStorage read) */
window.AZShop = {
  /* Equipped ID getters */
  getBirdSkin:   function(){ return equip_get('bird')   || 'default'; },
  getTetrisTheme:function(){ return equip_get('tetris') || 'default'; },
  getCardBack:   function(){ return equip_get('cards')  || 'default'; },
  getTitle:      function(){ return equip_get('titles') || null; },
  /* Skin data getters */
  getBirdSkinData:  function(){ return BIRD_SKINS[window.AZShop.getBirdSkin()]    || BIRD_SKINS['default']; },
  getCardBackData:  function(){ return CARD_BACKS[window.AZShop.getCardBack()]    || CARD_BACKS['default']; },
  getTetrisColors:  function(){ return TETRIS_THEMES[window.AZShop.getTetrisTheme()] || TETRIS_THEMES['default']; },
  /* Consumable power-ups */
  getPowerUp: function(id){ try{ return parseInt(localStorage.getItem(SK+'pu_'+id)||'0'); }catch(_){ return 0; } },
  usePowerUp: function(id){
    var n = window.AZShop.getPowerUp(id);
    if (n > 0){ try{ localStorage.setItem(SK+'pu_'+id, n-1); }catch(_){} return true; }
    return false;
  }
};

    { id:'continue_x3',name:'Continue ×3',     desc:'3 free continues for any game.',  icon:'❤️', cost:1500,  lvl:5, consumable:true, qty:3  },
    { id:'coins_x2',   name:'2× Coins 1hr',    desc:'Double coin earn for 60 mins.',   icon:'💰',  cost:3000,  lvl:8, consumable:true, qty:1  },
  ]
};

/* ══════════ RENDER GRID ════════════════════════════════════════ */
function renderGrid(catId, items) {
  var grid    = document.getElementById('grid-'+catId);
  var pLv     = getPlayerLevel();
  var eqId    = equip_get(catId);
  grid.innerHTML = '';

  items.forEach(function(item) {
    var isOwned    = owned(item.id) || item.cost === 0;
    var isEquipped = (eqId === item.id) || (item.cost === 0 && !eqId && catId !== 'pups');
    var isLocked   = pLv < item.lvl;
    var isCons     = item.consumable;

    /* For consumables, show stored count */
    var puCount = isCons ? AZShop.getPowerUp(item.id) : 0;
    var hasStock = isCons && puCount > 0;

    var div = document.createElement('div');
    div.className = 'shop-item'
      + (isEquipped && !isCons ? ' equipped' : '')
      + (isOwned && !isEquipped && !isCons ? ' owned' : '')
      + (isLocked ? ' locked' : '');

    /* Level lock badge */
    var lockBadge = isLocked ? '<div class="lv-lock">Lv.'+item.lvl+'</div>' : '';

    /* Status text */
    var statusHTML = '';
    if (isCons) {
      if (hasStock) statusHTML = '<div class="si-status s-own">×'+puCount+' IN STOCK</div>';
      else          statusHTML = '<div class="si-status s-buy">🪙 '+item.cost+'</div>';
    } else if (isEquipped) {
      statusHTML = '<div class="si-status s-eq">✓ EQUIPPED</div>';
    } else if (isOwned) {
      statusHTML = '<div class="si-status s-own">OWNED — TAP TO EQUIP</div>';
    } else if (isLocked) {
      statusHTML = '<div class="si-status s-lock">Unlock at Lv.'+item.lvl+'</div>';
    } else {
      statusHTML = '<div class="si-cost">🪙 '+item.cost+'</div>';
    }

    div.innerHTML =
      lockBadge +
      '<div class="si-preview">'+item.icon+'</div>' +
      '<div class="si-name">'+item.name+'</div>' +
      '<div class="si-desc">'+item.desc+'</div>' +
      statusHTML;

    if (!isLocked) {
      div.addEventListener('click', function(){
        if (isCons) {
          if (!hasStock) openBuyModal(catId, item);
        } else if (isEquipped) {
          /* already equipped — no-op */
        } else if (isOwned) {
          equipItem(catId, item.id, item.icon, item.name);
        } else {
          openBuyModal(catId, item);
        }
      });
    }

    grid.appendChild(div);
  });
}

function renderAll() {
  renderGrid('bird',   CATALOG.bird);
  renderGrid('tetris', CATALOG.tetris);
  renderGrid('cards',  CATALOG.cards);
  renderGrid('titles', CATALOG.titles);
  renderGrid('pups',   CATALOG.pups);
}

/* ══════════ EQUIP ITEM ════════════════════════════════════════ */
function equipItem(catId, itemId, icon, name) {
  equip_set(catId, itemId);
  SoundEngine.play('unlock');
  showEquipToast(icon + ' ' + name + ' equipped!');
  renderAll();
}

function showEquipToast(msg) {
  var old = document.querySelector('.equip-toast');
  if (old) old.remove();
  var el = document.createElement('div');
  el.className = 'equip-toast';
  el.textContent = '✓ ' + msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 1900);
}

/* ══════════ BUY MODAL ═════════════════════════════════════════ */
var _pendingItem = null, _pendingCat = null;

function openBuyModal(catId, item) {
  _pendingCat  = catId;
  _pendingItem = item;
  document.getElementById('sm-preview').textContent = item.icon;
  document.getElementById('sm-title').textContent   = item.name;
  document.getElementById('sm-desc').textContent    =
    item.desc + (item.qty ? '\n\nQty: ×' + item.qty : '');
  document.getElementById('sm-price').textContent   = '🪙 ' + item.cost;
  document.getElementById('sm-confirm').onclick = confirmBuy;
  document.getElementById('shop-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('shop-modal').classList.add('hidden');
  _pendingItem = null; _pendingCat = null;
}

function confirmBuy() {
  if (!_pendingItem) return;
  var item = _pendingItem, catId = _pendingCat;
  closeModal();

  if (!CoinEngine.spend(item.cost)) {
    CoinEngine.toast('Need 🪙'+item.cost+' — earn more in the Wallet!','warn');
    return;
  }
  CoinEngine.addHistory('🛍', 'Shop — '+item.name, -item.cost);
  SoundEngine.play('success');

  if (item.consumable) {
    /* Stack consumables */
    var cur = AZShop.getPowerUp(item.id);
    try { localStorage.setItem(SK+'pu_'+item.id, cur + item.qty); } catch(_){}
    CoinEngine.toast('🎒 ×'+item.qty+' '+item.name+' added to inventory!','coin');
  } else {
    markOwned(item.id);
    equipItem(catId, item.id, item.icon, item.name);
  }

  document.getElementById('shop-bal').textContent = CoinEngine.getBalance();
  renderAll();
}

/* Close modal on outside click */
document.getElementById('shop-modal').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

/* ══════════ INIT ══════════════════════════════════════════════ */
renderAll();
</script>
</body>
</html>
